<!DOCTYPE html>
<html lang="en" data-t="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCD Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f4f6f9;--cd:#ffffff;--bd:#e2e8f0;--bd2:#cbd5e1;--tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;--ac:#2563eb;--ac2:#3b82f6;--gn:#059669;--gn2:#10b981;--am:#d97706;--am2:#f59e0b;--rd:#dc2626;--rd2:#ef4444;--pu:#7c3aed;--tl:#0d9488;--cy:#0891b2;--shd:0 1px 3px rgba(15,23,42,.04);--shd2:0 4px 12px rgba(15,23,42,.08);--r:10px;}
[data-t="dark"]{--bg:#0a0f1d;--cd:#111827;--bd:#1f2937;--bd2:#374151;--tx:#f1f5f9;--tx2:#cbd5e1;--tx3:#64748b;--shd:0 1px 3px rgba(0,0,0,.3);--shd2:0 8px 24px rgba(0,0,0,.4);}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:'IBM Plex Mono',monospace;font-feature-settings:"tnum"}
button{font-family:inherit}
a{color:inherit;text-decoration:none}

/* HEADER */
header{background:var(--cd);border-bottom:1px solid var(--bd);padding:12px 24px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:50}
.logo{font-weight:700;font-size:16px;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.logo-mk{width:24px;height:24px;background:linear-gradient(135deg,var(--tl),var(--ac));border-radius:6px;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:700}
.spacer{flex:1}
.range{display:flex;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:2px}
.range button{background:none;border:none;padding:5px 11px;font-size:11.5px;font-weight:500;color:var(--tx2);cursor:pointer;border-radius:6px}
.range button.on{background:var(--cd);color:var(--tx);box-shadow:var(--shd)}
.icon-btn{background:none;border:1px solid var(--bd);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--tx2);font-size:11.5px;display:inline-flex;align-items:center;gap:5px}
.icon-btn:hover{background:var(--bg);color:var(--tx)}
.icon-btn.spin svg,.icon-btn.spin span{animation:spin .9s linear infinite;display:inline-block}
.icon-btn-prim{background:linear-gradient(135deg,#0d9488 0%,#0f766e 100%);color:#fff;border-color:transparent;font-weight:600}
.icon-btn-prim:hover{filter:brightness(1.12);background:linear-gradient(135deg,#0d9488 0%,#0f766e 100%);color:#fff}
.icon-btn:disabled{opacity:.6;cursor:not-allowed}
@keyframes spin{to{transform:rotate(360deg)}}

/* REFRESH BAR */
.rfsh{display:inline-flex;align-items:center;gap:8px;padding:3px 4px 3px 10px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;transition:border-color .2s,box-shadow .2s,background .2s}
.rfsh.refreshing{border-color:#f59e0b;background:linear-gradient(90deg,rgba(254,243,199,.45),rgba(253,230,138,.55));animation:rfsh-glow 1.1s ease-in-out infinite}
@keyframes rfsh-glow{
  0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.0),0 0 0 1px rgba(245,158,11,.3)}
  50%{box-shadow:0 0 14px 2px rgba(245,158,11,.55),0 0 0 1px rgba(245,158,11,.6)}
}
.rfsh-st{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;display:inline-flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace}
.rfsh-st::before{content:'';width:7px;height:7px;border-radius:50%;display:inline-block}
.rfsh-st.rfsh-sample{color:#92400e}.rfsh-st.rfsh-sample::before{background:#f59e0b}
.rfsh-st.rfsh-ok{color:var(--gn)}.rfsh-st.rfsh-ok::before{background:var(--gn);box-shadow:0 0 0 3px rgba(5,150,105,.18)}
.rfsh-st.rfsh-loading{color:var(--ac)}.rfsh-st.rfsh-loading::before{background:var(--ac);animation:pulse 1s ease-in-out infinite}
.rfsh-st.rfsh-err{color:var(--rd)}.rfsh-st.rfsh-err::before{background:var(--rd)}
.rfsh-sel{font-family:inherit;font-size:11px;padding:3px 6px;border:1px solid var(--bd);border-radius:6px;background:var(--cd);color:var(--tx2);cursor:pointer}
.rfsh-btn{background:var(--cd);border:1px solid var(--bd);border-radius:6px;padding:4px 8px;cursor:pointer;color:var(--tx2);font-size:13px;line-height:1}
.rfsh-btn:hover{background:var(--ac);color:#fff;border-color:var(--ac)}
.rfsh-btn.spin{pointer-events:none;opacity:.7}
.rfsh-btn.spin span{animation:spin .9s linear infinite;display:inline-block}

/* BANNERS */
.err-bn{display:none;align-items:center;gap:14px;background:linear-gradient(90deg,#fef2f2,#fee2e2);border-bottom:1px solid #dc2626;padding:14px 24px;color:#7f1d1d;font-size:13px}
.err-bn.show{display:flex}
.err-bn-ic{font-size:20px}
.err-bn-tx{flex:1;line-height:1.4}
.err-bn-tx strong{display:block;margin-bottom:2px;font-size:13.5px}
.err-bn-msg{font-size:11.5px;color:#991b1b;font-family:'IBM Plex Mono',monospace}
.err-bn-btn{padding:7px 14px;background:#dc2626;color:#fff;border:none;border-radius:6px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer}
.err-bn-btn:hover{background:#991b1b}
.alert-bn{background:linear-gradient(90deg,#fef2f2,#fee2e2);border-bottom:1px solid #fca5a5;padding:11px 24px;display:flex;align-items:center;gap:14px;font-size:13px;color:#7f1d1d}
.alert-bn.hide{display:none}
.alert-ic{font-size:16px}
.alert-tx{flex:1}
.alert-tx strong{color:#991b1b;font-weight:600}
.alert-cnt{display:inline-block;background:#991b1b;color:#fff;padding:1px 7px;border-radius:9px;font-size:10px;font-weight:700;margin-left:6px;font-family:'IBM Plex Mono',monospace}
.alert-list{margin-top:3px;font-size:11.5px;color:#991b1b;opacity:.85}
.alert-cls{background:#fff;border:1px solid #fca5a5;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:11px;color:#991b1b;font-weight:500}
.alert-cls:hover{background:#fee2e2}

/* TAB NAV */
nav.tabs{background:var(--cd);border-bottom:1px solid var(--bd);padding:0 24px;display:flex;gap:2px;position:sticky;top:53px;z-index:49;overflow-x:auto}
nav.tabs button{background:none;border:none;padding:13px 16px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
nav.tabs button.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:600}
nav.tabs button:not(.on):hover{color:var(--tx)}
nav.tabs .pill{background:var(--bg);color:var(--tx2);font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;font-family:'IBM Plex Mono',monospace}
nav.tabs .pill-rd{background:#fee2e2;color:#991b1b}

/* MAIN */
main{max-width:1440px;margin:0 auto;padding:22px}
.tab{display:none}
.tab.on{display:block}

/* GENERIC CARD */
.cd{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:18px;box-shadow:var(--shd)}
.cd-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.cd-t{font-size:13px;font-weight:600;color:var(--tx);letter-spacing:-.1px}
.cd-st{font-size:11px;color:var(--tx3)}
.cd-link{font-size:11.5px;color:var(--ac);font-weight:500;cursor:pointer}
.cd-link:hover{text-decoration:underline}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
.kpi{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:16px;position:relative;box-shadow:var(--shd);overflow:hidden}
.kpi::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--ac)}
.kpi-blue::before{background:var(--ac)}
.kpi-teal::before{background:var(--tl)}
.kpi-green::before{background:var(--gn)}
.kpi-amber::before{background:var(--am)}
.kpi-red::before{background:var(--rd)}
.kpi-purple::before{background:var(--pu)}
.kpi-l{font-size:10.5px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-v{font-size:30px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--tx);letter-spacing:-.5px;line-height:1.05}
.kpi-d{font-size:11px;color:var(--tx3);margin-top:5px;display:flex;align-items:center;gap:5px}
.kpi-d .delta{font-family:'IBM Plex Mono',monospace;font-weight:500}

/* CHART ROWS */
.row{display:grid;gap:14px;margin-bottom:18px}
.r-2-1{grid-template-columns:2fr 1fr}
.r-1-1{grid-template-columns:1fr 1fr}
.r-1-1-1{grid-template-columns:1fr 1fr 1fr}
.r-3-2{grid-template-columns:3fr 2fr}
.chart-wrap{position:relative;height:260px}
.chart-wrap-tall{position:relative;height:340px}

/* CATEGORY DRILLDOWN */
.cat-drill{margin-top:14px;padding:13px 16px;background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid #bfdbfe;border-radius:8px;font-size:13px;display:none}
.cat-drill.on{display:block}
.cat-drill-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-weight:600;color:#1e40af}
.cat-drill-cls{font-size:11px;color:var(--ac);cursor:pointer;font-weight:500}
.cat-drill-row{display:flex;justify-content:space-between;padding:5px 0;border-top:1px solid #bfdbfe;font-size:12px}
.cat-drill-row:first-of-type{border-top:none}
.cat-drill-l{color:#1e3a8a}
.cat-drill-v{font-family:'IBM Plex Mono',monospace;font-weight:600;color:#1e40af}

/* HERO CARDS */
.hero{border-radius:var(--r);padding:20px;color:#fff;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;min-height:160px}
.hero:hover{transform:translateY(-2px);box-shadow:var(--shd2)}
.hero::after{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:rgba(255,255,255,.08);border-radius:50%}
.hero-am{background:linear-gradient(135deg,#d97706,#f59e0b 70%,#fbbf24)}
.hero-rd{background:linear-gradient(135deg,#b91c1c,#dc2626 70%,#ef4444)}
.hero-tl{background:linear-gradient(135deg,#0d9488,#14b8a6 70%,#2dd4bf)}
.hero-pu{background:linear-gradient(135deg,#6d28d9,#7c3aed 70%,#8b5cf6)}
.hero-l{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;opacity:.9;display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.hero-p{font-size:18px;font-weight:600;margin-top:8px;letter-spacing:-.3px;position:relative;z-index:1;line-height:1.25}
.hero-r{font-size:11.5px;opacity:.85;margin-top:3px;position:relative;z-index:1}
.hero-co{font-size:12.5px;margin-top:11px;line-height:1.5;opacity:.95;position:relative;z-index:1}
.hero-pct{position:absolute;top:18px;right:20px;font-size:22px;font-weight:600;font-family:'IBM Plex Mono',monospace;z-index:1}

/* PROGRESS / METRIC BARS */
.mbar{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.mbar:last-child{margin-bottom:0}
.mbar-h{display:flex;justify-content:space-between;font-size:12px}
.mbar-h-l{color:var(--tx2);font-weight:500}
.mbar-h-v{font-family:'IBM Plex Mono',monospace;font-weight:600}
.mbar-tk{height:7px;background:var(--bg);border-radius:4px;overflow:hidden;position:relative}
.mbar-fl{height:100%;border-radius:4px;transition:width .3s}

/* COMPLIANCE / FOLLOWUP ROWS */
.fu-row{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--bd);font-size:13px}
.fu-row:last-child{border-bottom:none}
.fu-p{font-weight:600;color:var(--tx)}
.fu-p-sub{font-size:11.5px;color:var(--tx3);font-weight:400;margin-top:1px}
.fu-due{font-size:11.5px;color:var(--tx2);white-space:nowrap}
.fu-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px;font-family:'IBM Plex Mono',monospace}
.fu-tag-od{background:#fee2e2;color:#991b1b}
.fu-tag-st{background:#fef3c7;color:#92400e}
.fu-tag-pn{background:#dbeafe;color:#1e40af}
.fu-tag-ok{background:#d1fae5;color:#065f46}
.fu-act{font-size:11.5px;color:var(--ac);cursor:pointer;font-weight:500}
.fu-act:hover{text-decoration:underline}
.fu-empty{padding:24px;text-align:center;color:var(--tx3);font-size:13px}

/* LEADERBOARD */
.lb{width:100%;border-collapse:collapse;font-size:13px}
.lb th{text-align:left;padding:10px 12px;font-size:10.5px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bd);background:var(--bg)}
.lb th:first-child,.lb td:first-child{padding-left:18px}
.lb th:last-child,.lb td:last-child{padding-right:18px}
.lb td{padding:11px 12px;border-bottom:1px solid var(--bd);vertical-align:middle}
.lb tr{cursor:pointer}
.lb tr:hover td{background:var(--bg)}
.lb tr:last-child td{border-bottom:none}
.lb-rk{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--tx3);font-size:12px;width:30px}
.lb-nm{font-weight:600}
.lb-nm-sub{font-size:11px;color:var(--tx3);font-weight:400}
.lb-num{font-family:'IBM Plex Mono',monospace;font-weight:500}
.lb-pct{display:flex;align-items:center;gap:8px}
.lb-pct-bar{width:50px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.lb-pct-fl{height:100%;border-radius:3px}

/* CALL LOG */
.filter-bar{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding:12px 16px;background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--shd);flex-wrap:wrap}
.filter-bar select,.filter-bar input{font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--bd);border-radius:7px;background:var(--bg);color:var(--tx);cursor:pointer}
.filter-bar input{cursor:text;min-width:200px}
.filter-bar .hint{font-size:11.5px;color:var(--tx3);margin-left:auto}
.filter-bar .count{font-size:12px;color:var(--tx2);font-family:'IBM Plex Mono',monospace}

.call{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--shd)}
.call-flag{border-color:#fca5a5;background:linear-gradient(to right,#fef2f2 0%,var(--cd) 6%)}
.call-comp{border-color:#dc2626;border-width:1.5px;background:linear-gradient(to right,#fee2e2 0%,var(--cd) 8%)}
.call-dead{border-style:dashed;opacity:.78}
.call-hd{padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;flex-wrap:wrap}
.call-hd:hover{background:var(--bg)}
.call-p{font-weight:600;font-size:13.5px}
.call-p-sub{font-size:11.5px;color:var(--tx3);font-weight:400;margin-top:1px}
.cat-badge{display:inline-block;font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.cat-tech{background:#dbeafe;color:#1e40af}
.cat-refund{background:#fef3c7;color:#92400e}
.cat-warranty{background:#ede9fe;color:#5b21b6}
.cat-shipping{background:#cffafe;color:#155e75}
.cat-order{background:#e0e7ff;color:#3730a3}
.cat-sales{background:#d1fae5;color:#065f46}
.cat-comp{background:#fee2e2;color:#991b1b}
.cat-fulfill{background:#fce7f3;color:#9d174d}
.cat-other{background:var(--bg);color:var(--tx2);border:1px dashed var(--bd2)}
.fl-tag{font-size:10px;font-weight:600;color:#991b1b;background:#fee2e2;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px;font-family:'IBM Plex Mono',monospace}
.cf-tag{font-size:10px;font-weight:600;color:#92400e;background:#fef3c7;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px;font-family:'IBM Plex Mono',monospace}
.ma-tag{font-size:10px;font-weight:700;color:#fff;background:#dc2626;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px;font-family:'IBM Plex Mono',monospace;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.ngr-tag{font-size:9.5px;font-weight:600;color:var(--tx3);background:var(--bg);padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace;border:1px solid var(--bd2)}
.dots{display:flex;gap:4px;margin-left:auto}
.dot{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:9px;font-weight:700;color:#fff}
.dot-ok{background:var(--gn)}
.dot-no{background:var(--rd);opacity:.55}
.dot-tv{background:var(--tl)}
.dot-comp{background:var(--rd)}
.call-dur{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--tx3);min-width:42px;text-align:right}
.call-sent{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;min-width:90px;text-align:right;letter-spacing:-.2px}
.sent-ok{color:var(--gn)}
.sent-mid{color:var(--am)}
.sent-bad{color:var(--rd)}

.call-bd{display:none;padding:0 16px 16px 16px;border-top:1px solid var(--bd);background:linear-gradient(to bottom,var(--bg),transparent 30%)}
.call-bd.open{display:block}
.call-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding-top:14px}
.cb{padding:12px 14px;background:var(--cd);border:1px solid var(--bd);border-radius:8px;border-left-width:3px}
.cb-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.cb-tx{font-size:12.5px;line-height:1.55;color:var(--tx2)}
.cb-issue{border-left-color:var(--ac)}.cb-issue .cb-l{color:var(--ac)}
.cb-prod{border-left-color:var(--tl)}.cb-prod .cb-l{color:var(--tl)}
.cb-out{border-left-color:var(--gn)}.cb-out .cb-l{color:var(--gn)}
.cb-flag{border-left-color:var(--rd)}.cb-flag .cb-l{color:var(--rd)}
.cb-quote{border-left-color:var(--am)}.cb-quote .cb-l{color:var(--am)}
.cb-comp{border-left-color:var(--rd);background:#fef2f2}.cb-comp .cb-l{color:#991b1b}.cb-comp .cb-tx{color:#7f1d1d}
.cb-tx pre{white-space:pre-wrap;font-family:inherit;font-size:12px;line-height:1.55;color:var(--tx2);max-height:200px;overflow-y:auto;background:var(--bg);padding:8px 10px;border-radius:6px;margin-top:6px}
.call-act{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.act-btn{font-size:11.5px;padding:7px 13px;background:var(--cd);border:1px solid var(--bd);border-radius:7px;cursor:pointer;color:var(--tx2);font-family:inherit;font-weight:500}
.act-btn:hover{background:var(--bg);color:var(--tx);border-color:var(--bd2)}

/* REP CARDS */
.rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.rep-cd{cursor:pointer;transition:transform .15s,box-shadow .15s}
.rep-cd:hover{transform:translateY(-1px);box-shadow:var(--shd2)}
.rep-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.rep-nm{font-size:16px;font-weight:600;letter-spacing:-.2px}
.rep-em{font-size:11.5px;color:var(--tx3);margin-top:1px}
.rep-cnt{font-size:11px;color:var(--tx2);margin-top:4px}
.rep-big{font-size:38px;font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:-1px;line-height:1}
.rep-big-sub{font-size:11px;color:var(--tx3);text-align:right;margin-top:2px}
.rep-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.rep-st{background:var(--bg);border-radius:7px;padding:9px 10px;text-align:center}
.rep-st-v{font-size:17px;font-weight:600;font-family:'IBM Plex Mono',monospace;line-height:1.1}
.rep-st-l{font-size:9.5px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.rep-flags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.rep-fl{font-size:10.5px;font-family:'IBM Plex Mono',monospace;padding:3px 8px;border-radius:5px;font-weight:600}
.rep-fl-good{background:#d1fae5;color:#065f46}

<script>
// ════════════════════════════════════════════════════════════════════
// INITIAL STATE (empty stub)
// Hydrates from cache on init, then overwritten by A3 fetch.
// Schema mirrors what Automation 3 (DCD Data Feed) returns.
// ════════════════════════════════════════════════════════════════════
let D = {
  meta: { last_updated: null, period_days: 0, date_range: "no data", source: "loading" },
  kpis: { total_calls: 0, dead_calls: 0, compliance_flags: 0, replacements_shipped: 0, fcr_count: 0, fcr_rate_pct: 0, teamviewer_sessions: 0, escalated: 0, retention_attempts: 0, retention_success: 0, upsell_attempts: 0, upsell_success: 0, avg_duration_min: 0, satisfied_count: 0, satisfied_pct: 0, frustrated_count: 0 },
  alerts: [],
  categories: {},
  resolutions: {},
  sentiments: {},
  daily: [],
  reps: [],
  products: { by_brand: {}, by_model: [], repeat_models: [] },
  compliance_calls: [],
  followups: [],
  calls: [],
  dead_calls: []
};

// ════════════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════════════
// DATA SOURCE CONFIG
// dataUrl: live DCD A3 dashboard data feed.
// triggerUrl: A2 manual report trigger. Wire when email destination is
// finalized (currently A2 emails Mark, not Mike).
// Endpoint must return JSON matching the shape A3 produces.
// ════════════════════════════════════════════════════════════════════
const CONFIG = {
  dataUrl: "https://stsrecycling.app.n8n.cloud/webhook/dcd-dashboard",
  triggerUrl: null,
  defaultIntervalMin: 0
};
let refreshTimer = null;

async function loadData(manual = false) {
  if (!CONFIG.dataUrl) {
    setStatus("err", "Not configured");
    showError("CONFIG.dataUrl is not set. Wire the dashboard to the DCD A3 webhook.");
    return;
  }
  setStatus("loading", "Refreshing");
  document.getElementById("rfshBtn").classList.add("spin");
  document.getElementById("rfshBox").classList.add("refreshing");
  try {
    const r = await fetch(CONFIG.dataUrl, { cache: "no-store" });
    if (!r.ok) throw new Error(`HTTP ${r.status} from A3 webhook`);
    const fresh = await r.json();
    if (!fresh || !fresh.meta) throw new Error("Response missing meta block");
    D = fresh;
    saveCache(fresh);
    hideError();
    document.getElementById("genTs").textContent = fmtTs(D.meta.last_updated);
    rebuildAll();
    setStatus("ok", "Live, just now");
  } catch (e) {
    console.error("loadData error:", e);
    const cached = loadCache();
    if (cached) {
      setStatus("err", "Refresh failed · using cache");
    } else {
      setStatus("err", "Could not load data");
      showError(e.message);
    }
  } finally {
    document.getElementById("rfshBtn").classList.remove("spin");
    document.getElementById("rfshBox").classList.remove("refreshing");
  }
}

function showError(msg) {
  document.getElementById("errBanner").classList.add("show");
  document.getElementById("errBannerMsg").textContent = msg || "Unknown error";
}
function hideError() {
  document.getElementById("errBanner").classList.remove("show");
}

// ════════════════════════════════════════════════════════════════════
// LOCAL CACHE
// Persists last successful A3 response in browser localStorage so the
// dashboard reloads instantly without hitting the webhook. Manual refresh
// and the auto-refresh interval still hit A3 on demand.
// CACHE_VERSION: bump when A3's payload shape changes (renamed field, new
// section, etc) so old caches with incompatible schemas are silently
// ignored and refetched instead of rendering a broken view.
// ════════════════════════════════════════════════════════════════════
const CACHE_VERSION = 1;
const CACHE_KEY = "dcd_dash_data_v1";
const CACHE_TS_KEY = "dcd_dash_ts_v1";
const CACHE_VER_KEY = "dcd_dash_ver_v1";

function saveCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    localStorage.setItem(CACHE_TS_KEY, String(Date.now()));
    localStorage.setItem(CACHE_VER_KEY, String(CACHE_VERSION));
  } catch (e) {
    console.warn("Cache write failed:", e.message);
  }
}

function loadCache() {
  try {
    const ver = parseInt(localStorage.getItem(CACHE_VER_KEY) || "0", 10);
    if (ver !== CACHE_VERSION) return null;
    const raw = localStorage.getItem(CACHE_KEY);
    const ts = localStorage.getItem(CACHE_TS_KEY);
    if (!raw || !ts) return null;
    const data = JSON.parse(raw);
    if (!data || !data.meta) return null;
    return { data, ts: parseInt(ts, 10) };
  } catch (e) {
    console.warn("Cache read failed:", e.message);
    return null;
  }
}

function ageMin(ts) {
  return Math.round((Date.now() - ts) / 60000);
}

function setStatus(state, text) {
  const el = document.getElementById("rfshStatus");
  el.className = "rfsh-st rfsh-" + state;
  el.textContent = text;
}

function setRefreshInterval(min) {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  if (min > 0 && CONFIG.dataUrl) {
    refreshTimer = setInterval(() => loadData(false), min * 60 * 1000);
  }
}

// ════════════════════════════════════════════════════════════════════
// MANUAL REPORT TRIGGER (POSTs to CONFIG.triggerUrl)
// ════════════════════════════════════════════════════════════════════
async function sendReport(mode, payload = {}, btn = null) {
  if (!CONFIG.triggerUrl) {
    alert("Manual trigger not configured.\n\nSet CONFIG.triggerUrl to the DCD A2 report webhook.");
    return false;
  }
  const label = mode === "manager" ? "manager report to Mike" : `report for ${payload.rep_name}`;
  if (!confirm(`Send the ${label} now?\n\nThis triggers the DCD daily report immediately instead of waiting for the 6:30pm scheduled run.`)) return false;

  const origText = btn ? btn.textContent : null;
  if (btn) { btn.disabled = true; btn.textContent = "Sending…"; }

  try {
    const r = await fetch(CONFIG.triggerUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mode, ...payload, triggered_by: "dashboard", triggered_at: new Date().toISOString() })
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    if (btn) { btn.textContent = "✓ Sent"; setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 2500); }
    else { alert(`Sent. The ${label} should arrive within a couple of minutes.`); }
    return true;
  } catch (e) {
    if (btn) { btn.textContent = "✗ Failed"; setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 3000); }
    alert(`Send failed: ${e.message}\n\nCheck the n8n workflow and CORS on the webhook.`);
    return false;
  }
}

// ════════════════════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════════════════════
function fmtTs(s){ if(!s) return "…"; try{ const d=new Date(s); return d.toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});}catch(e){return s;}}
function fmtDate(s){ if(!s) return ""; try{ const d=new Date(s); return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}catch(e){return s;}}
function fmtMin(m){ if(m==null) return "—"; return Number(m).toFixed(1) + "m"; }
function fmtMoney(n){ if(n==null) return "—"; return "$" + Number(n).toLocaleString("en-US",{maximumFractionDigits:0}); }
function pct(n,d){ if(!d) return 0; return Math.round(100*n/d); }
function safe(s){ if(s==null) return ""; return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function isTrue(v){ return v===true || v==="TRUE" || v==="true" || v===1; }
function parseFlags(v){ if(!v) return []; if(Array.isArray(v)) return v; try{ const p=JSON.parse(v); return Array.isArray(p)?p:[]; }catch(e){ return []; } }

const CAT_LABELS = {
  TECH_SUPPORT_HARDWARE: {label:"Tech · Hardware", cls:"cat-tech"},
  TECH_SUPPORT_SOFTWARE: {label:"Tech · Software", cls:"cat-tech"},
  TECH_SUPPORT_SETUP:    {label:"Tech · Setup",    cls:"cat-tech"},
  REFUND_RETURN:         {label:"Refund/Return",   cls:"cat-refund"},
  WARRANTY:              {label:"Warranty",        cls:"cat-warranty"},
  SHIPPING:              {label:"Shipping",        cls:"cat-shipping"},
  ORDER_INQUIRY:         {label:"Order Inquiry",   cls:"cat-order"},
  FULFILLMENT_ERROR:     {label:"Fulfillment Err", cls:"cat-fulfill"},
  SALES_TRANSFER:        {label:"Sales Transfer",  cls:"cat-sales"},
  COMPLIANCE_QC:         {label:"Compliance/QC",   cls:"cat-comp"},
  OTHER:                 {label:"Other",           cls:"cat-other"}
};
function catLabel(k){ return (CAT_LABELS[k]||{label:k,cls:"cat-other"}); }

const RES_LABELS = {
  RESOLVED_ON_PHONE:           "Resolved on phone",
  RESOLVED_TEAMVIEWER:         "Resolved · TeamViewer",
  REPLACEMENT_SHIPPED:         "Replacement shipped",
  REPLACEMENT_PENDING_APPROVAL:"Replacement pending",
  PAID_UPGRADE_PROCESSED:      "Paid upgrade",
  REFUND_PROCESSED:            "Refund processed",
  RETURN_INITIATED:            "Return initiated",
  TRANSFERRED_TO_SALES:        "Transferred to sales",
  ESCALATED:                   "Escalated",
  INFO_PROVIDED:               "Info provided"
};
function resLabel(k){ return RES_LABELS[k] || (k||"Unknown").replace(/_/g," "); }

const SENT_CLS = { SATISFIED:"sent-ok", NEUTRAL:"sent-mid", FRUSTRATED:"sent-bad", ANGRY:"sent-bad", DISSATISFIED:"sent-bad" };
function sentCls(s){ return SENT_CLS[(s||"").toUpperCase()] || "sent-mid"; }

// ════════════════════════════════════════════════════════════════════
// THEME / TAB SWITCH
// ════════════════════════════════════════════════════════════════════
function toggleTheme(){ const el=document.documentElement; el.dataset.t = el.dataset.t==="dark"?"light":"dark"; rebuildAll(); }
const B = {};
function st(id, btn){
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.remove("on"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  btn.classList.add("on");
  document.getElementById(id).classList.add("on");
  if(!B[id]){
    if(id==="home") buildHome();
    if(id==="calls") buildCalls();
    if(id==="reps") buildReps();
    if(id==="products") buildProducts();
    if(id==="compliance") buildCompliance();
    if(id==="followups") buildFollowups();
    B[id] = true;
  }
}

function rebuildAll(){
  Object.keys(B).forEach(k=>{ B[k]=false; });
  document.getElementById("home").innerHTML = "";
  document.getElementById("calls").innerHTML = "";
  document.getElementById("reps").innerHTML = "";
  document.getElementById("products").innerHTML = "";
  document.getElementById("compliance").innerHTML = "";
  document.getElementById("followups").innerHTML = "";
  buildHome(); B.home = true;
  updateBadges();
}

function updateBadges(){
  document.getElementById("callsBadge").textContent = (D.calls||[]).length;
  document.getElementById("compBadge").textContent = (D.compliance_calls||[]).length;
  document.getElementById("fuBadge").textContent = (D.followups||[]).length;
}

// ════════════════════════════════════════════════════════════════════
// OVERVIEW (home)
// ════════════════════════════════════════════════════════════════════
function buildHome(){
  const k = D.kpis||{};
  const sc = D.solidCommerce||{};
  const fin = sc.financials||{};
  const home = document.getElementById("home");
  home.innerHTML = `
    <div class="kpis">
      <div class="kpi kpi-blue"><div class="kpi-l">Total Calls</div><div class="kpi-v">${k.total_calls||0}</div><div class="kpi-d">${D.meta?.period_days||"—"} day window · ${k.dead_calls||0} dead</div></div>
      <div class="kpi kpi-teal"><div class="kpi-l">Replacements</div><div class="kpi-v">${k.replacements_shipped||0}</div><div class="kpi-d">shipped or pending</div></div>
      <div class="kpi kpi-${(k.compliance_flags||0)>0?"red":"green"}"><div class="kpi-l">Compliance Flags</div><div class="kpi-v">${k.compliance_flags||0}</div><div class="kpi-d">school + BIOS + data</div></div>
      <div class="kpi kpi-amber"><div class="kpi-l">FCR Rate</div><div class="kpi-v">${k.fcr_rate_pct||0}%</div><div class="kpi-d">${k.fcr_count||0}/${k.total_calls||0} resolved first call</div></div>
      <div class="kpi kpi-purple"><div class="kpi-l">Avg Duration</div><div class="kpi-v">${k.avg_duration_min||0}<span style="font-size:18px;color:var(--tx3)">m</span></div><div class="kpi-d">${k.satisfied_pct||0}% satisfied</div></div>
    </div>

    ${sc.meta?.connected ? `
    <div class="sc-banner">

let catChart = null, resChart = null, dailyChart = null, sentChart = null;

function renderCatChart(){
  const ctx = document.getElementById("catChart");
  if(!ctx) return;
  const cats = D.categories || {};
  const entries = Object.entries(cats).sort((a,b)=>b[1].count-a[1].count);
  const labels = entries.map(([k])=>catLabel(k).label);
  const counts = entries.map(([,v])=>v.count);
  const keys   = entries.map(([k])=>k);
  if(catChart) catChart.destroy();
  catChart = new Chart(ctx, {
    type: "bar",
    data: { labels, datasets: [{ data: counts, backgroundColor: "#2563eb", borderRadius: 6 }] },
    options: {
      indexAxis: "y",
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `${c.parsed.x} call${c.parsed.x===1?"":"s"}` } } },
      scales: { x: { beginAtZero: true, ticks: { stepSize: 1, font:{family:"IBM Plex Mono"} } }, y: { ticks: { font:{size:11.5} } } },
      onClick: (e, els) => { if(els.length) openCatDrill(keys[els[0].index]); }
    }
  });
}

function openCatDrill(key){
  const cat = (D.categories||{})[key];
  if(!cat) return;
  document.getElementById("catDrillTitle").textContent = catLabel(key).label + " · " + cat.count + " call" + (cat.count===1?"":"s");
  const body = document.getElementById("catDrillBody");
  const issues = Object.entries(cat.issues||{}).sort((a,b)=>b[1]-a[1]);
  body.innerHTML = issues.length
    ? issues.map(([k,v])=>`<div class="cat-drill-row"><span class="cat-drill-l">${safe(k)}</span><span class="cat-drill-v">${v}</span></div>`).join("")
    : `<div class="cat-drill-row"><span class="cat-drill-l">No subcategories recorded</span></div>`;
  document.getElementById("catDrill").classList.add("on");
}
function closeCatDrill(){ document.getElementById("catDrill").classList.remove("on"); }

function renderResChart(){
  const ctx = document.getElementById("resChart"); if(!ctx) return;
  const res = D.resolutions || {};
  const entries = Object.entries(res).sort((a,b)=>b[1]-a[1]);

    type: "doughnut",

  });
}

function renderDailyChart(){

function renderSentChart(){

let callFilters = { search: "", category: "all", rep: "all", flag: "all" };

function buildCalls(){
  const calls = [...(D.calls||[]), ...(D.dead_calls||[]).map(d=>({...d, _dead:true}))];
  const reps = [...new Set(calls.map(c=>c.rep_name).filter(Boolean))].sort();
  const cats = [...new Set(calls.map(c=>c.call_category).filter(Boolean))].sort();
  const el = document.getElementById("calls");
  el.innerHTML = `
    <div class="filter-bar">
      <input type="search" id="callSearch" placeholder="Search customer, order #, product, transcript…" oninput="onFilter()">
      <select id="catFilter" onchange="onFilter()">
        <option value="all">All categories</option>
        ${cats.map(c=>`<option value="${safe(c)}">${catLabel(c).label}</option>`).join("")}
      </select>
      <select id="repFilter" onchange="onFilter()">
        <option value="all">All agents</option>
        ${reps.map(r=>`<option value="${safe(r)}">${safe(r)}</option>`).join("")}
      </select>
      <select id="flagFilter" onchange="onFilter()">
        <option value="all">All calls</option>
        <option value="compliance">Compliance flagged</option>
        <option value="frustrated">Frustrated customer</option>
        <option value="teamviewer">TeamViewer used</option>
        <option value="dead">Dead / voicemail</option>
      </select>
      <span class="hint"><span class="count" id="callCount">${calls.length}</span> calls</span>
    </div>
    <div id="callList"></div>
  `;
  renderCallList();
}

function onFilter(){
  callFilters.search   = (document.getElementById("callSearch")||{}).value || "";
  callFilters.category = (document.getElementById("catFilter")||{}).value || "all";
  callFilters.rep      = (document.getElementById("repFilter")||{}).value || "all";
  callFilters.flag     = (document.getElementById("flagFilter")||{}).value || "all";
  renderCallList();
}

function callMatchesFilters(c){
  const f = callFilters;
  if(f.category !== "all" && c.call_category !== f.category) return false;
  if(f.rep !== "all" && c.rep_name !== f.rep) return false;
  if(f.flag === "compliance" && !(isTrue(c.school_lock)||isTrue(c.bios_lock)||isTrue(c.data_not_wiped))) return false;
  if(f.flag === "frustrated" && (c.sentiment||"").toUpperCase()!=="FRUSTRATED") return false;
  if(f.flag === "teamviewer" && !isTrue(c.teamviewer_session)) return false;
  if(f.flag === "dead" && !c._dead) return false;
  if(f.search){
    const q = f.search.toLowerCase();
    const blob = [c.customer_name,c.customer_email,c.order_number,c.product_brand,c.product_model,
                  c.product_specs,c.issue_detail,c.outcome_detail,c.call_summary,c.transcript_formatted,
                  c.transcript_snippet,c.rep_name].filter(Boolean).join(" ").toLowerCase();
    if(!blob.includes(q)) return false;
  }
  return true;
}

function renderCallList(){
  const all = [...(D.calls||[]), ...(D.dead_calls||[]).map(d=>({...d, _dead:true}))];
  const filtered = all.filter(callMatchesFilters);
  document.getElementById("callCount").textContent = filtered.length;
  const list = document.getElementById("callList");
  if(!filtered.length){ list.innerHTML = `<div class="cd"><div class="fu-empty">No calls match current filters</div></div>`; return; }
  list.innerHTML = filtered.map(c=>renderCallCard(c)).join("");
}

function renderCallCard(c){
  const dead = c._dead;
  const compFlag = isTrue(c.school_lock)||isTrue(c.bios_lock)||isTrue(c.data_not_wiped);
  const frustrated = (c.sentiment||"").toUpperCase()==="FRUSTRATED";
  const cls = compFlag ? "call call-comp" : (frustrated || isTrue(c.escalated)) ? "call call-flag" : (dead ? "call call-dead" : "call");
  const cat = catLabel(c.call_category||"OTHER");
  const tags = [];
  if(compFlag) tags.push(`<span class="ma-tag">⚠ Compliance</span>`);
  if(frustrated) tags.push(`<span class="fl-tag">Frustrated</span>`);
  if(isTrue(c.escalated)) tags.push(`<span class="fl-tag">Escalated</span>`);
  if(isTrue(c.teamviewer_session)) tags.push(`<span class="cf-tag">TeamViewer</span>`);
  if(dead) tags.push(`<span class="ngr-tag">${c.is_voicemail?"Voicemail":"Dead"}</span>`);
  const cust = c.customer_name || (dead?"unknown":"unidentified customer");
  const prod = [c.product_brand, c.product_model].filter(Boolean).join(" ") || c.product_type || "";
  const dur = c.duration_minutes!=null ? fmtMin(c.duration_minutes) : (c.duration_seconds!=null ? Math.round(c.duration_seconds/60*10)/10+"m" : "—");
  const orders = D.solidCommerce?.orders || {};
  const ordVal = c.order_number && orders[c.order_number]?.value;
  const ordValTag = ordVal ? `<span class="ord-val" title="Order value from Solid Commerce">${fmtMoney(ordVal)}</span>` : "";

  const headerLine = `
    <div class="call-hd" onclick="this.parentElement.querySelector('.call-bd').classList.toggle('open')">
      <span class="cat-badge ${cat.cls}">${cat.label}</span>
      <div>
        <div class="call-p">${safe(cust)}</div>
        <div class="call-p-sub">${safe(c.rep_name||"unassigned")} · ${fmtDate(c.call_date)}${prod?` · ${safe(prod)}`:""}${c.order_number?` · order ${safe(c.order_number)}${ordValTag}`:""}</div>
      </div>
      <div class="dots">${tags.join("")}</div>
      <div class="call-dur">${dur}</div>
      <div class="call-sent ${sentCls(c.sentiment)}">${safe(c.sentiment||"—")}</div>
    </div>
  `;
  return `<div class="${cls}">${headerLine}${renderCallBody(c, dead)}</div>`;
}

function renderCallBody(c, dead){
  if(dead){
    return `<div class="call-bd">
      <div class="call-grid">
        <div class="cb cb-issue"><div class="cb-l">Reason</div><div class="cb-tx">${safe(c.dead_reason||"—")}</div></div>
        <div class="cb cb-prod"><div class="cb-l">Outcome</div><div class="cb-tx">${c.is_voicemail?"Voicemail received. Customer expects callback.":"Short call · likely transfer or hangup."}</div></div>
      </div>
      ${c.transcript_snippet?`<div class="cb cb-quote" style="margin-top:14px"><div class="cb-l">Transcript Snippet</div><div class="cb-tx"><pre>${safe(c.transcript_snippet)}</pre></div></div>`:""}
    </div>`;
  }
  const compFlags = [];
  if(isTrue(c.school_lock)) compFlags.push(`<span class="comp-tag comp-tag-school">School Lock</span>`);
  if(isTrue(c.bios_lock)) compFlags.push(`<span class="comp-tag comp-tag-bios">BIOS Lock</span>`);
  if(isTrue(c.data_not_wiped)) compFlags.push(`<span class="comp-tag comp-tag-data">Data Not Wiped</span>`);
  const agentFlags = parseFlags(c.agent_behavior_flags);
  const custFlags = parseFlags(c.customer_behavior_flags);
  const policyFlags = parseFlags(c.policy_flags);
  const scOrder = c.order_number ? (D.solidCommerce?.orders||{})[c.order_number] : null;

  return `<div class="call-bd">
    <div class="call-grid">
      <div class="cb cb-issue">
        <div class="cb-l">Issue</div>
        <div class="cb-tx"><strong>${safe(c.issue_type||"—")}</strong>${c.issue_detail?` · ${safe(c.issue_detail)}`:""}</div>
      </div>
      <div class="cb cb-prod">
        <div class="cb-l">Product${scOrder?` <span class="sc-banner-tag" style="margin-left:4px">SC</span>`:""}</div>
        <div class="cb-tx">${safe([c.product_brand,c.product_model].filter(Boolean).join(" ")||c.product_type||"—")}${c.product_specs?` · ${safe(c.product_specs)}`:""}${c.platform?`<br><span style="color:var(--tx3);font-size:11px">platform: ${safe(c.platform)}</span>`:""}${c.order_number?`<br><span style="color:var(--tx3);font-size:11px">order: ${safe(c.order_number)}${scOrder?` · ${fmtMoney(scOrder.value)} · placed ${fmtDate(scOrder.date)}`:""}</span>`:""}</div>
      </div>
      <div class="cb cb-out">
        <div class="cb-l">Outcome</div>
        <div class="cb-tx"><strong>${safe(resLabel(c.resolution_type))}</strong>${c.outcome_detail?`<br>${safe(c.outcome_detail)}`:""}</div>
      </div>
      ${compFlags.length||agentFlags.length||policyFlags.length?`
      <div class="cb cb-flag">
        <div class="cb-l">Flags</div>
        <div class="cb-tx">${compFlags.join(" ")} ${agentFlags.map(f=>`<span class="fl-tag" style="margin-right:4px">${safe(f)}</span>`).join("")} ${policyFlags.map(f=>`<span class="cf-tag" style="margin-right:4px">${safe(f)}</span>`).join("")}</div>
      </div>`:`
      <div class="cb cb-quote">
        <div class="cb-l">Sentiment Evidence</div>
        <div class="cb-tx">${safe(c.sentiment_evidence||"—")}</div>
      </div>`}
    </div>
    ${c.call_summary?`<div class="cb cb-quote" style="margin-top:14px"><div class="cb-l">Summary</div><div class="cb-tx">${safe(c.call_summary)}</div></div>`:""}
    ${c.transcript_formatted?`<div class="cb cb-quote" style="margin-top:10px"><div class="cb-l">Transcript</div><div class="cb-tx"><pre>${safe(c.transcript_formatted)}</pre></div></div>`:""}
    <div class="call-act">
      ${c.meeting_url?`<a href="${safe(c.meeting_url)}" target="_blank" class="act-btn">🔗 Open Krisp recording</a>`:""}
      ${c.order_number?`<button class="act-btn" onclick="navigator.clipboard.writeText('${safe(c.order_number)}')">📋 Copy order #</button>`:""}
      <button class="act-btn" onclick="navigator.clipboard.writeText('${safe(c.call_id)}')">📋 Copy call ID</button>
    </div>
  </div>`;
}

function goToCall(callId){
  document.querySelector('nav.tabs button:nth-child(2)').click();
  setTimeout(()=>{
    document.getElementById("callSearch").value = callId;
    onFilter();
    const first = document.querySelector("#callList .call");
    if(first) first.querySelector(".call-bd").classList.add("open");
  }, 100);
}

function buildReps(){
  const el = document.getElementById("reps");
  const reps = D.reps || [];
  if(!reps.length){ el.innerHTML = `<div class="cd"><div class="fu-empty">No agent data available</div></div>`; return; }
  el.innerHTML = `<div class="rep-grid">${reps.map(renderRepCard).join("")}</div>`;
}

function renderRepCard(r){
  const total = r.calls || 1;
  const fcrPct = pct(r.fcr, total);
  const satPct = pct(r.satisfied, total);
  const flags = [];
  if(r.compliance_flags) flags.push(`<span class="rep-fl rep-fl-bad">${r.compliance_flags} compliance</span>`);
  if(r.escalations) flags.push(`<span class="rep-fl rep-fl-warn">${r.escalations} escalated</span>`);
  if(r.replacements) flags.push(`<span class="rep-fl rep-fl-good">${r.replacements} replaced</span>`);
  if(r.resolved_on_phone) flags.push(`<span class="rep-fl rep-fl-good">${r.resolved_on_phone} resolved on phone</span>`);
  Object.entries(r.agent_flags||{}).forEach(([k,v])=>{
    const cls = k.includes("EXCEPTIONAL") ? "rep-fl-good" : (k.includes("NO_RETENTION")||k.includes("REFUSED")||k.includes("RUDE")) ? "rep-fl-bad" : "rep-fl-warn";
    flags.push(`<span class="rep-fl ${cls}">${safe(k)} ×${v}</span>`);
  });
  return `<div class="cd rep-cd">
    <div class="rep-hd">
      <div>
        <div class="rep-nm">${safe(r.name||"Unknown")}</div>
        <div class="rep-em">${safe(r.email||"")}</div>
        <div class="rep-cnt">${r.calls} call${r.calls===1?"":"s"} in window</div>
      </div>
      <div>
        <div class="rep-big">${r.avg_duration_min||0}<span style="font-size:18px;color:var(--tx3)">m</span></div>
        <div class="rep-big-sub">avg duration</div>
      </div>
    </div>
    <div class="rep-stats">
      <div class="rep-st"><div class="rep-st-v">${r.calls}</div><div class="rep-st-l">Calls</div></div>
      <div class="rep-st"><div class="rep-st-v">${fcrPct}%</div><div class="rep-st-l">FCR</div></div>
      <div class="rep-st"><div class="rep-st-v">${satPct}%</div><div class="rep-st-l">Satisfied</div></div>
      <div class="rep-st"><div class="rep-st-v">${r.frustrated||0}</div><div class="rep-st-l">Frustrated</div></div>
    </div>
    <div class="mbar">
      <div class="mbar-h"><span class="mbar-h-l">Sentiment mix</span><span class="mbar-h-v">${r.satisfied}/${r.neutral}/${r.frustrated}</span></div>
      <div class="mbar-tk" style="display:flex">
        <div style="background:var(--gn);height:100%;width:${pct(r.satisfied,total)}%"></div>
        <div style="background:var(--am2);height:100%;width:${pct(r.neutral,total)}%"></div>
        <div style="background:var(--rd);height:100%;width:${pct(r.frustrated,total)}%"></div>
      </div>
    </div>
    <div class="rep-flags">${flags.join("") || `<span class="rep-fl rep-fl-good">no flags</span>`}</div>
    <div style="margin-top:14px;text-align:right">
      <button class="act-btn" onclick="filterByRep('${safe(r.name)}')">view this agent's calls →</button>
    </div>
  </div>`;
}

function filterByRep(name){
  document.querySelector('nav.tabs button:nth-child(2)').click();
  setTimeout(()=>{
    document.getElementById("repFilter").value = name;
    onFilter();
  }, 100);
}

// ════════════════════════════════════════════════════════════════════
// PRODUCTS
// ════════════════════════════════════════════════════════════════════
function buildProducts(){
  const el = document.getElementById("products");
  const p = D.products || {};
  const brands = p.by_brand || {};
  const models = p.by_model || [];
  const repeats = p.repeat_models || [];
  const catalog = D.solidCommerce?.catalog || {};
  const scConnected = D.solidCommerce?.meta?.connected;
  const maxBrand = Math.max(...Object.values(brands), 1);

  const enrichRow = (modelName, callCount, isRepeat) => {
    const sc = catalog[modelName];
    const lowStock = sc?.low_stock || (sc && sc.in_stock < 5);
    const highReturn = sc && sc.return_rate_30d_pct >= 10;
    return `
      <div class="cat-row" onclick="filterBySearch('${safe(modelName)}')" style="cursor:pointer">
        <div class="prod-nm">${safe(modelName)} ${isRepeat?`<span class="prod-rep-tag">×${callCount}</span>`:""} ${lowStock?`<span class="low-stock-tag">low stock</span>`:""}</div>
        <div class="cat-stat">${sc?fmtMoney(sc.avg_price):"—"}</div>
        <div class="cat-stat">${sc?sc.units_sold_30d:"—"}</div>
        <div class="cat-stat ${lowStock?"cat-stat-low":""}">${sc?sc.in_stock:"—"}</div>
        <div class="cat-stat ${highReturn?"cat-stat-warn":""}">${sc?sc.return_rate_30d_pct.toFixed(1)+"%":"—"}</div>
      </div>
    `;
  };

  const headerRow = `
    <div class="cat-row cat-row-h">
      <div>Model</div>
      <div style="text-align:right">Avg $ <span class="sc-tag" style="position:static;margin-left:4px">SC</span></div>
      <div style="text-align:right">Sold 30d <span class="sc-tag" style="position:static;margin-left:4px">SC</span></div>
      <div style="text-align:right">Stock <span class="sc-tag" style="position:static;margin-left:4px">SC</span></div>
      <div style="text-align:right">Ret % <span class="sc-tag" style="position:static;margin-left:4px">SC</span></div>
    </div>
  `;

  el.innerHTML = `
    ${scConnected ? `
    <div class="sc-banner">
      <span class="sc-banner-ic">💰</span>
      <span class="sc-banner-tag">SC Live</span>
      <span>Pricing, inventory, and 30-day return rates pulled from <strong>Solid Commerce</strong></span>
      <span class="sc-banner-meta">${Object.keys(catalog).length} SKUs · last sync ${fmtTs(D.solidCommerce.meta.last_sync)}</span>
    </div>
    ` : ""}

    <div class="prod-grid">
      <div class="cd">
        <div class="cd-h"><div class="cd-t">Calls by Brand</div><div class="cd-st">${Object.keys(brands).length} brand${Object.keys(brands).length===1?"":"s"}</div></div>
        ${Object.entries(brands).sort((a,b)=>b[1]-a[1]).map(([b,c])=>`
          <div class="prod-row">
            <div class="prod-nm">${safe(b)}</div>
            <div class="prod-bar"><div class="prod-bar-fl" style="width:${100*c/maxBrand}%"></div></div>
            <div class="prod-cnt">${c}</div>
          </div>
        `).join("") || `<div class="fu-empty">No brand data</div>`}
      </div>
      <div class="cd">
        <div class="cd-h"><div class="cd-t">Repeat-Issue Models</div><div class="cd-st">${repeats.length} model${repeats.length===1?"":"s"} · 2+ support calls</div></div>
        ${repeats.length ? `${headerRow}${repeats.map(m=>enrichRow(m.model, m.count, true)).join("")}` : `<div class="fu-empty">No repeat models in current window</div>`}
      </div>
    </div>

    <div class="cd">
      <div class="cd-h"><div class="cd-t">All Models · Catalog View</div><div class="cd-st">click any row to filter call log${scConnected?" · ":""}${scConnected?`<span class="sc-banner-tag" style="margin-left:6px">SC enriched</span>`:""}</div></div>
      ${models.length ? `${headerRow}${models.map(m=>enrichRow(m.model, m.count, false)).join("")}` : `<div class="fu-empty">No model data</div>`}
    </div>
  `;
}

function filterBySearch(q){
  document.querySelector('nav.tabs button:nth-child(2)').click();
  setTimeout(()=>{ document.getElementById("callSearch").value = q; onFilter(); }, 100);
}

// ════════════════════════════════════════════════════════════════════
// COMPLIANCE
// ════════════════════════════════════════════════════════════════════
function buildCompliance(){
  const el = document.getElementById("compliance");
  const items = D.compliance_calls || [];
  const sl = items.filter(i=>isTrue(i.school_lock)).length;
  const bl = items.filter(i=>isTrue(i.bios_lock)).length;
  const dn = items.filter(i=>isTrue(i.data_not_wiped)).length;
  const orders = D.solidCommerce?.orders || {};
  const scConnected = D.solidCommerce?.meta?.connected;
  const exposure = items.reduce((sum, i) => sum + (orders[i.order_number]?.value || 0), 0);

  el.innerHTML = `
    ${scConnected && items.length ? `
    <div class="comp-exp">
      <div>
        <div class="comp-exp-l">💰 Replacement Cost Exposure <span class="sc-banner-tag" style="margin-left:6px">SC</span></div>
        <div class="comp-exp-v">${fmtMoney(exposure)}</div>
      </div>
      <div class="comp-exp-meta">
        across ${items.length} flagged unit${items.length===1?"":"s"}<br>
        order values from Solid Commerce
      </div>
    </div>
    ` : ""}

    <div class="comp-grid">
      <div class="comp-kpi ${sl===0?"ok":""}"><div class="comp-kpi-l">School Locks</div><div class="comp-kpi-v">${sl}</div><div class="comp-kpi-d">device managed by school district</div></div>
      <div class="comp-kpi ${bl===0?"ok":""}"><div class="comp-kpi-l">BIOS Locks</div><div class="comp-kpi-v">${bl}</div><div class="comp-kpi-d">end user cannot access device</div></div>
      <div class="comp-kpi ${dn===0?"ok":""}"><div class="comp-kpi-l">Data Not Wiped</div><div class="comp-kpi-v">${dn}</div><div class="comp-kpi-d">previous owner data exposed</div></div>
    </div>

    <div class="cd">
      <div class="cd-h"><div class="cd-t">Compliance-Flagged Calls</div><div class="cd-st">${items.length} flagged · sorted newest first</div></div>
      ${items.length ? items.map(i=>{
        const ordVal = orders[i.order_number]?.value;
        return `
        <div class="fu-row">
          <div>
            <div class="fu-p">
              ${isTrue(i.school_lock)?`<span class="comp-tag comp-tag-school">School</span>`:""}
              ${isTrue(i.bios_lock)?`<span class="comp-tag comp-tag-bios">BIOS</span>`:""}
              ${isTrue(i.data_not_wiped)?`<span class="comp-tag comp-tag-data">Data</span>`:""}
              ${safe(i.product||"unknown product")}
            </div>
            <div class="fu-p-sub">${safe(i.rep_name||"unassigned")} · ${safe(i.platform||"unknown platform")}${i.order_number?` · order ${safe(i.order_number)}`:""}${ordVal?` <span class="ord-val">${fmtMoney(ordVal)}</span>`:""}</div>
            ${i.summary?`<div class="fu-p-sub" style="margin-top:4px">${safe(i.summary)}</div>`:""}
          </div>
          <div class="fu-due">${fmtDate(i.date)}</div>
          <div class="fu-act" onclick="goToCall('${safe(i.call_id)}')">view ↗</div>
        </div>`;
      }).join("") : `<div class="fu-empty">No compliance flags in current window. ✓</div>`}
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════════
// FOLLOW-UPS
// ════════════════════════════════════════════════════════════════════
function buildFollowups(){
  const el = document.getElementById("followups");
  const items = D.followups || [];
  el.innerHTML = `
    <div class="cd">
      <div class="cd-h"><div class="cd-t">Promised Callbacks & Open Items</div><div class="cd-st">${items.length} open</div></div>
      ${items.length ? items.map(i=>`
        <div class="fu-row">
          <div>
            <div class="fu-p">${safe(i.customer_name||"unknown customer")}<span class="fu-p-sub"> · ${safe(i.rep_name||"")}${i.order_number?` · order ${safe(i.order_number)}`:""}</span></div>
            <div class="fu-p-sub" style="margin-top:3px">${safe(i.callback||i.summary||"—")}</div>
          </div>
          <div class="fu-due">${fmtDate(i.date)}</div>
          <span class="fu-tag fu-tag-pn">Open</span>
          <div class="fu-act" onclick="goToCall('${safe(i.call_id)}')">view ↗</div>
        </div>
      `).join("") : `<div class="fu-empty">No open follow-ups in current window.<br><span style="font-size:11px">A2 will populate this from <span class="mono">customer_callback</span> field and Claude-extracted promises in <span class="mono">call_summary</span> once those are wired in.</span></div>`}
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════
document.querySelectorAll("#rangeCtl button").forEach(b=>{
  b.onclick = () => {
    document.querySelectorAll("#rangeCtl button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    document.getElementById("cov").textContent = b.textContent;
    // NOTE: client-side time filtering is a v1.1 feature. Range buttons currently visual-only.
    // A3 webhook should accept ?range=today|week|month|all when wired.
  };
});

document.getElementById("rfshInterval").addEventListener("change", e => setRefreshInterval(parseInt(e.target.value, 10)));
document.getElementById("rfshInterval").value = String(CONFIG.defaultIntervalMin);
setRefreshInterval(CONFIG.defaultIntervalMin);

// Hydrate from cache before first paint so reloads are instant and survive
// network failures or n8n outages. A3 fetch (manual or scheduled) overwrites cache.
if (CONFIG.dataUrl) {
  const cached = loadCache();
  if (cached) {
    D = cached.data;
    setStatus("ok", `Cached · ${ageMin(cached.ts)} min ago`);
  }
}

buildHome();
B.home = true;
updateBadges();

if (CONFIG.dataUrl) loadData(false);
</script>
</body>
</html>
