<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STS Vitals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* TAKEOVER: detach from host page (Joomla, etc) and own the viewport */
html.pb-locked, body.pb-locked{overflow:hidden!important;height:100%!important;margin:0!important;padding:0!important;background:transparent!important}
#pb-takeover{
  position:fixed!important;
  top:0!important;left:0!important;right:0!important;bottom:0!important;
  width:100vw!important;height:100vh!important;height:100dvh!important;
  margin:0!important;padding:0!important;
  z-index:2147483647!important;
  background:var(--bg);
  color:var(--tx);
  font-family:'Outfit',sans-serif;
  font-size:14px;
  overflow:hidden!important;
  isolation:isolate;
  --bg:#0a0f1d; --cd:#111827; --bd:#1f2937; --bd2:#374151;
  --tx:#f1f5f9; --tx2:#cbd5e1; --tx3:#64748b;
  --ac:#3b82f6; --ac2:#60a5fa; --gr:#10b981; --am:#f59e0b; --rd:#ef4444;
  --r:10px;
}
#pb-takeover[data-t="light"]{
  --bg:#f4f6f9; --cd:#ffffff; --bd:#e2e8f0; --bd2:#cbd5e1;
  --tx:#0f172a; --tx2:#475569; --tx3:#94a3b8;
}
#pb-takeover *,#pb-takeover *::before,#pb-takeover *::after{box-sizing:border-box}
#pb-takeover .mono{font-family:'IBM Plex Mono',monospace;font-feature-settings:"tnum"}

#pb-takeover .app{display:grid;grid-template-columns:280px 1fr;height:100vh;height:100dvh;width:100%;transition:grid-template-columns .2s ease}
#pb-takeover .app.side-collapsed{grid-template-columns:62px 1fr}

/* SIDEBAR */
#pb-takeover .side{background:var(--cd);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
#pb-takeover .side-tog{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--bd);min-height:46px;gap:10px}
#pb-takeover .app.side-collapsed .side-tog{justify-content:center;padding:10px 0}
#pb-takeover .side-wordmark{font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--tx);font-family:'Outfit',sans-serif;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden}
#pb-takeover .side-wordmark-mk{width:24px;height:24px;border-radius:5px;object-fit:contain;display:inline-block;flex-shrink:0}
#pb-takeover .app.side-collapsed .side-wordmark{display:none}
#pb-takeover .tog-btn{cursor:pointer;background:transparent;border:1px solid var(--bd);border-radius:6px;width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;color:var(--tx2);font-size:14px;line-height:1;transition:background .12s,color .12s,border-color .12s;padding:0}
#pb-takeover .tog-btn:hover{background:var(--bg);color:var(--tx);border-color:var(--bd2)}
#pb-takeover .side-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0}
#pb-takeover .grp-h{padding:14px 18px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);font-family:'IBM Plex Mono',monospace}
#pb-takeover .grp-h:first-child{padding-top:8px}
#pb-takeover .app.side-collapsed .grp-h{padding:0;height:1px;background:var(--bd);margin:10px 12px;color:transparent;overflow:hidden;font-size:0}
#pb-takeover .app.side-collapsed .grp-h:first-child{margin-top:4px}

#pb-takeover .nav{display:flex;align-items:center;gap:12px;padding:8px 14px;border-left:3px solid transparent;color:var(--tx2);cursor:pointer;font-size:13.5px;transition:background .12s,color .12s,border-color .12s;user-select:none}
#pb-takeover .nav:hover{background:rgba(59,130,246,.08);color:var(--tx)}
#pb-takeover .nav.active{background:rgba(59,130,246,.12);color:var(--tx);border-left-color:var(--ac)}
#pb-takeover .nav-ico{flex:0 0 30px;height:30px;display:inline-flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--bd);border-radius:6px;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--tx2);letter-spacing:0;line-height:1}
#pb-takeover .nav.active .nav-ico{background:rgba(59,130,246,.18);border-color:var(--ac);color:var(--ac2)}
#pb-takeover .nav-tx{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#pb-takeover .nav-lbl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#pb-takeover .nav-sub{font-size:10.5px;color:var(--tx3);margin-top:1px;font-family:'IBM Plex Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

#pb-takeover .app.side-collapsed .nav{padding:6px 0;justify-content:center;border-left:none;position:relative}
#pb-takeover .app.side-collapsed .nav.active{background:transparent}
#pb-takeover .app.side-collapsed .nav.active::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--ac);border-radius:0 2px 2px 0}
#pb-takeover .app.side-collapsed .nav-tx{display:none}
#pb-takeover .app.side-collapsed .nav-ico{flex:0 0 32px;height:32px;font-size:11.5px}

#pb-takeover .side-f{padding:12px 14px;border-top:1px solid var(--bd);font-size:11px;color:var(--tx3);display:flex;justify-content:space-between;align-items:center;gap:8px}
#pb-takeover .side-f-r{display:flex;align-items:center;gap:4px}
#pb-takeover .app.side-collapsed .side-f{justify-content:center;padding:12px 0;flex-direction:column;gap:6px}
#pb-takeover .app.side-collapsed .side-f-l{display:none}
#pb-takeover .theme-tog,#pb-takeover .reset-btn{cursor:pointer;color:var(--tx2);padding:5px 9px;border-radius:5px;font-size:11px;border:1px solid transparent;background:transparent;font:inherit;line-height:1}
#pb-takeover .theme-tog:hover,#pb-takeover .reset-btn:hover{background:var(--bg);color:var(--tx);border-color:var(--bd)}
#pb-takeover .app.side-collapsed .theme-tog,#pb-takeover .app.side-collapsed .reset-btn{padding:5px 7px}

/* MAIN */
#pb-takeover .main{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* IFRAME */
#pb-takeover .frame-wrap{flex:1;background:var(--bg);position:relative;overflow:hidden}
#pb-takeover .frame-pane{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff;display:none}
#pb-takeover .frame-pane.show{display:block}
#pb-takeover .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;color:var(--tx2)}
#pb-takeover .empty-ic{font-size:48px;margin-bottom:14px;opacity:.4}
#pb-takeover .empty-t{font-size:18px;font-weight:600;margin-bottom:6px;color:var(--tx)}
#pb-takeover .empty-d{font-size:13px;color:var(--tx3);max-width:420px;line-height:1.5}
#pb-takeover .empty-d code{font-family:'IBM Plex Mono',monospace;font-size:11.5px;background:var(--cd);padding:1px 6px;border-radius:3px;border:1px solid var(--bd)}
</style>
</head>

      <button class="tog-btn" id="togBtn" onclick="toggleSide()" title="Collapse menu" aria-label="Collapse menu">≡</button>
    </div>
    <div class="side-list" id="list"></div>
    <div class="side-f">
      <span class="side-f-l mono">STS</span>
      <span class="side-f-r">
        <button class="reset-btn" id="resetBtn" onclick="resetAll()" title="Force reload all open dashboards" aria-label="Reset cache">↻</button>

    <div class="frame-wrap" id="frameWrap">
      <div class="empty" id="empty">
        <div class="empty-ic">📄</div>
        <div class="empty-t">Pick a page from the menu</div>
        <div class="empty-d">
          Loading from <code>xkluziv12.github.io/Page-Builder/</code>. Open dashboards stay loaded in memory so switching back is instant. Hit ↻ in the bottom-left to force reload all of them.
        </div>
      </div>
    </div>
  </main>

<script>
// TAKEOVER: run immediately, then again on DOMContentLoaded for safety.
// Detaches the menu from any host page (Joomla wrappers, articles, modules) and
// hides every other body child so the menu owns the viewport.
(function takeover(){
  function apply(){
    const el = document.getElementById('pb-takeover');
    if (!el) return;
    // Reparent to body if Joomla nested us deep in a wrapper
    if (el.parentElement !== document.body) {
      document.body.appendChild(el);
    }
    // Hide every other top-level body child
    Array.from(document.body.children).forEach(child => {
      if (child !== el && child.tagName !== 'SCRIPT') {
        child.style.setProperty('display', 'none', 'important');
      }
    });
    // Lock host html and body
    document.documentElement.classList.add('pb-locked');
    document.body.classList.add('pb-locked');
    // Watch for any late-injected siblings (Joomla modules, chat widgets, etc) and hide them too
    if (!window.__pb_observer) {
      window.__pb_observer = new MutationObserver(() => {
        Array.from(document.body.children).forEach(child => {
          if (child !== el && child.tagName !== 'SCRIPT' && child.style.display !== 'none') {
            child.style.setProperty('display', 'none', 'important');
          }
        });
      });
      window.__pb_observer.observe(document.body, { childList: true });
    }
  }
  apply();
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', apply);
  }
})();

const BASE = "https://xkluziv12.github.io/Page-Builder/";

// Each entry: file is the actual filename in the repo, label is what shows in menu, icon is the abbreviation used in collapsed view and in the icon box
const GROUPS = [
  {
    name: "Dashboards",
    pages: [
      { file: "DCD-grading.html",   label: "DCD-Pulse",     sub: "DCD-grading.html",   icon: "D" },
      { file: "SALES-grading.html", label: "Sales-Pulse",   sub: "SALES-grading.html", icon: "S" },
      { file: "WIW-data.html",      label: "WIW-Pulse",     sub: "WIW-data.html",      icon: "W" },
      { file: "admin.html",         label: "Admin-Pulse",   sub: "admin.html",         icon: "A" },
      { file: "ops.html",           label: "Ops-Pulse",     sub: "ops.html",           icon: "O" },
      { file: "it.html",            label: "IT-Pulse",      sub: "it.html",            icon: "I" },
      { file: "reach.html",         label: "Reach-Pulse",   sub: "reach.html",         icon: "R" }
    ]
  },
  {
    name: "Marketing Management",
    pages: [
      { file: "index.html",         label: "Home",          sub: "index.html",         icon: "H" },
      { file: "Hub+spoke.html",     label: "Hub + Spoke",   sub: "Hub+spoke.html",     icon: "⌘" },
      { file: "blog-terminal.html", label: "Blog Terminal", sub: "blog-terminal.html", icon: "B" },
      { file: "page-terminal.html", label: "Page Terminal", sub: "page-terminal.html", icon: "P" }
    ]
  }
];
const PAGES = GROUPS.flatMap(g => g.pages);

// Map of file -> iframe element. Created lazily on first visit, kept in DOM
// until manually reset. Switching dashboards just toggles which one is shown.
const frames = new Map();
let currentFile = null;

function urlFor(file){
  // encodeURI handles the + in Hub+spoke.html and any other special chars
  return BASE + encodeURI(file);
}

function renderList(){
  const list = document.getElementById("list");
  list.innerHTML = GROUPS.map(g => `
    <div class="grp-h">${g.name}</div>
    ${g.pages.map(p => `
      <div class="nav" data-file="${p.file}" onclick="loadPage('${p.file}')" title="${p.label}">
        <span class="nav-ico">${p.icon}</span>
        <span class="nav-tx">
          <span class="nav-lbl">${p.label}</span>
        </span>
      </div>
    `).join("")}
  `).join("");
}

function loadPage(file){
  currentFile = file;
  const empty = document.getElementById("empty");
  const wrap = document.getElementById("frameWrap");

  document.querySelectorAll(".nav").forEach(n => {
    n.classList.toggle("active", n.dataset.file === file);
  });

  empty.style.display = "none";

  // Hide every existing pane
  frames.forEach(f => f.classList.remove("show"));

  // Find existing pane for this file or create one
  let pane = frames.get(file);
  if (!pane) {
    pane = document.createElement("iframe");
    pane.className = "frame-pane";
    pane.referrerPolicy = "no-referrer-when-downgrade";
    pane.src = urlFor(file);
    wrap.appendChild(pane);
    frames.set(file, pane);
  }
  pane.classList.add("show");

  // Update browser URL with #file so refresh persists selection
  history.replaceState(null, "", "#" + file);
}

function resetAll(){
  if (!confirm("Force reload all open dashboards? In-memory state will be lost. Each dashboard's saved data cache stays intact.")) return;
  frames.forEach(f => f.remove());
  frames.clear();
  currentFile = null;
  document.querySelectorAll(".nav").forEach(n => n.classList.remove("active"));
  document.getElementById("empty").style.display = "flex";
  history.replaceState(null, "", window.location.pathname);
}

function toggleSide(){
  const app = document.getElementById("app");
  const collapsed = app.classList.toggle("side-collapsed");
  const btn = document.getElementById("togBtn");
  btn.title = collapsed ? "Expand menu" : "Collapse menu";
  btn.setAttribute("aria-label", collapsed ? "Expand menu" : "Collapse menu");
  btn.textContent = collapsed ? "›" : "≡";
  try { localStorage.setItem("pb_side", collapsed ? "1" : "0"); } catch(e){}
}

function toggleTheme(){
  const root = document.getElementById("pb-takeover");
  const cur = root.getAttribute("data-t");
  const next = cur === "dark" ? "light" : "dark";
  root.setAttribute("data-t", next);
  document.getElementById("themeTog").textContent = next === "dark" ? "☀" : "🌙";
  try { localStorage.setItem("pb_theme", next); } catch(e){}
}

// Init
(function(){
  try {
    const saved = localStorage.getItem("pb_theme");
    if (saved) {
      document.getElementById("pb-takeover").setAttribute("data-t", saved);
      document.getElementById("themeTog").textContent = saved === "dark" ? "☀" : "🌙";
    }
    if (localStorage.getItem("pb_side") === "1") {
      document.getElementById("app").classList.add("side-collapsed");
      const btn = document.getElementById("togBtn");
      btn.textContent = "›";
      btn.title = "Expand menu";
      btn.setAttribute("aria-label", "Expand menu");
    }
  } catch(e){}

  renderList();

  // If URL has #file, restore that selection
  const hash = window.location.hash.slice(1);
  if (hash && PAGES.find(p => p.file === hash)) {
    loadPage(hash);
  }
})();
</script>
