<!DOCTYPE html>
<html lang="en" data-t="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STS Sales Intelligence · Sam's Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f4f6f9;--cd:#ffffff;--bd:#e2e8f0;--bd2:#cbd5e1;--tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;--ac:#2563eb;--ac2:#3b82f6;--gn:#059669;--gn2:#10b981;--am:#d97706;--am2:#f59e0b;--rd:#dc2626;--rd2:#ef4444;--pu:#7c3aed;--tl:#0d9488;--cy:#0891b2;--shd:0 1px 3px rgba(15,23,42,.04);--shd2:0 4px 12px rgba(15,23,42,.08);--r:10px;}
[data-t="dark"]{--bg:#0a0f1d;--cd:#111827;--bd:#1f2937;--bd2:#374151;--tx:#f1f5f9;--tx2:#cbd5e1;--tx3:#64748b;--shd:0 1px 3px rgba(0,0,0,.3);--shd2:0 8px 24px rgba(0,0,0,.4);}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:'IBM Plex Mono',monospace;font-feature-settings:"tnum"}
button{font-family:inherit}
a{color:inherit;text-decoration:none}

/* HEADER */
header{background:var(--cd);border-bottom:1px solid var(--bd);padding:12px 24px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:50}
.logo{font-weight:700;font-size:16px;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.logo-mk{width:24px;height:24px;background:linear-gradient(135deg,var(--ac),var(--pu));border-radius:6px;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:700}
.spacer{flex:1}
.range{display:flex;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:2px}
.range button{background:none;border:none;padding:5px 11px;font-size:11.5px;font-weight:500;color:var(--tx2);cursor:pointer;border-radius:6px}
.range button.on{background:var(--cd);color:var(--tx);box-shadow:var(--shd)}
.icon-btn{background:none;border:1px solid var(--bd);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--tx2);font-size:11.5px;display:inline-flex;align-items:center;gap:5px}
.icon-btn:hover{background:var(--bg);color:var(--tx)}
.icon-btn.spin svg,.icon-btn.spin span{animation:spin .9s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* REFRESH BAR */
.rfsh{display:inline-flex;align-items:center;gap:8px;padding:3px 4px 3px 10px;background:var(--bg);border:1px solid var(--bd);border-radius:8px}
.rfsh-st{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;display:inline-flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace}
.rfsh-st::before{content:'';width:7px;height:7px;border-radius:50%;display:inline-block}
.rfsh-st.rfsh-sample{color:#92400e}.rfsh-st.rfsh-sample::before{background:#f59e0b}
.rfsh-st.rfsh-cached{color:#92400e}.rfsh-st.rfsh-cached::before{background:#f59e0b;animation:pulse 2s ease-in-out infinite}
.rfsh-st.rfsh-ok{color:var(--gn)}.rfsh-st.rfsh-ok::before{background:var(--gn);box-shadow:0 0 0 3px rgba(5,150,105,.18)}
.rfsh-st.rfsh-loading{color:var(--ac)}.rfsh-st.rfsh-loading::before{background:var(--ac);animation:pulse 1s ease-in-out infinite}
.rfsh-st.rfsh-err{color:var(--rd)}.rfsh-st.rfsh-err::before{background:var(--rd)}
.rfsh-sel{font-family:inherit;font-size:11px;padding:3px 6px;border:1px solid var(--bd);border-radius:6px;background:var(--cd);color:var(--tx2);cursor:pointer}
.rfsh-btn{background:var(--cd);border:1px solid var(--bd);border-radius:6px;padding:4px 8px;cursor:pointer;color:var(--tx2);font-size:13px;line-height:1}
.rfsh-btn:hover{background:var(--ac);color:#fff;border-color:var(--ac)}
.rfsh-btn.spin{pointer-events:none;opacity:.7}
.rfsh-btn.spin span{animation:spin .9s linear infinite;display:inline-block}

/* BANNERS */
.alert-bn{background:linear-gradient(90deg,#fef2f2,#fee2e2);border-bottom:1px solid #fca5a5;padding:11px 24px;display:flex;align-items:center;gap:14px;font-size:13px;color:#7f1d1d}
.alert-bn.hide{display:none}
.alert-ic{font-size:16px}
.alert-tx{flex:1}
.alert-tx strong{color:#991b1b;font-weight:600}
.alert-cnt{display:inline-block;background:#991b1b;color:#fff;padding:1px 7px;border-radius:9px;font-size:10px;font-weight:700;margin-left:6px;font-family:'IBM Plex Mono',monospace}
.alert-list{margin-top:3px;font-size:11.5px;color:#991b1b;opacity:.85}
.alert-cls{background:#fff;border:1px solid #fca5a5;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:11px;color:#991b1b;font-weight:500}
.alert-cls:hover{background:#fee2e2}

/* No-data banner: shown when CONFIG.dataUrl is null OR fetch failed with no cache */
.nodata-bn{background:linear-gradient(90deg,#fef3c7,#fde68a);border-bottom:1px solid #f59e0b;padding:14px 24px;display:flex;align-items:center;gap:14px;font-size:13px;color:#78350f}
.nodata-bn.hide{display:none}
.nodata-ic{font-size:18px}
.nodata-tx{flex:1;line-height:1.45}
.nodata-tx strong{color:#7c2d12;font-weight:600;display:block;margin-bottom:2px}
.nodata-tx .mono{color:#92400e}
.nodata-act{background:#fff;border:1px solid #f59e0b;border-radius:6px;padding:6px 13px;cursor:pointer;font-size:12px;color:#78350f;font-weight:600;font-family:inherit}
.nodata-act:hover{background:#fef3c7}

/* TAB NAV */
nav.tabs{background:var(--cd);border-bottom:1px solid var(--bd);padding:0 24px;display:flex;gap:2px;position:sticky;top:53px;z-index:49}
nav.tabs button{background:none;border:none;padding:13px 16px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:inline-flex;align-items:center;gap:6px}
nav.tabs button.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:600}
nav.tabs button:not(.on):hover{color:var(--tx)}
nav.tabs .pill{background:var(--bg);color:var(--tx2);font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;font-family:'IBM Plex Mono',monospace}
nav.tabs .pill-rd{background:#fee2e2;color:#991b1b}

/* MAIN */
main{max-width:1440px;margin:0 auto;padding:22px}
.tab{display:none}
.tab.on{display:block}

/* GENERIC CARD */
.cd{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:18px;box-shadow:var(--shd)}
.cd-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.cd-t{font-size:13px;font-weight:600;color:var(--tx);letter-spacing:-.1px}
.cd-st{font-size:11px;color:var(--tx3)}
.cd-link{font-size:11.5px;color:var(--ac);font-weight:500;cursor:pointer}
.cd-link:hover{text-decoration:underline}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
.kpi{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:16px;position:relative;box-shadow:var(--shd);overflow:hidden}
.kpi::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--ac)}
.kpi-blue::before{background:var(--ac)}
.kpi-green::before{background:var(--gn)}
.kpi-amber::before{background:var(--am)}
.kpi-red::before{background:var(--rd)}
.kpi-purple::before{background:var(--pu)}
.kpi-l{font-size:10.5px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-v{font-size:30px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--tx);letter-spacing:-.5px;line-height:1.05}
.kpi-d{font-size:11px;color:var(--tx3);margin-top:5px;display:flex;align-items:center;gap:5px}
.kpi-d .delta{font-family:'IBM Plex Mono',monospace;font-weight:500}
.delta-up{color:var(--gn)}
.delta-dn{color:var(--rd)}

/* CHART ROWS */
.row{display:grid;gap:14px;margin-bottom:18px}
.r-2-1{grid-template-columns:2fr 1fr}
.r-1-1{grid-template-columns:1fr 1fr}
.r-1-1-1{grid-template-columns:1fr 1fr 1fr}
.r-3-2{grid-template-columns:3fr 2fr}
.chart-wrap{position:relative;height:240px}

/* HERO CARDS */
.hero{border-radius:var(--r);padding:20px;color:#fff;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;min-height:170px}
.hero:hover{transform:translateY(-2px);box-shadow:var(--shd2)}
.hero::after{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:rgba(255,255,255,.08);border-radius:50%}
.hero-am{background:linear-gradient(135deg,#d97706,#f59e0b 70%,#fbbf24)}
.hero-rd{background:linear-gradient(135deg,#b91c1c,#dc2626 70%,#ef4444)}
.hero-tl{background:linear-gradient(135deg,#0d9488,#14b8a6 70%,#2dd4bf)}
.hero-l{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;opacity:.9;display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.hero-p{font-size:18px;font-weight:600;margin-top:8px;letter-spacing:-.3px;position:relative;z-index:1;line-height:1.25}
.hero-r{font-size:11.5px;opacity:.85;margin-top:3px;position:relative;z-index:1}
.hero-co{font-size:12.5px;margin-top:11px;line-height:1.5;opacity:.95;position:relative;z-index:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-pct{position:absolute;top:18px;right:20px;font-size:22px;font-weight:600;font-family:'IBM Plex Mono',monospace;z-index:1}
.hero.open .hero-co{-webkit-line-clamp:unset;display:block}
.hero-ext{display:none;margin-top:13px;padding-top:13px;border-top:1px solid rgba(255,255,255,.2);position:relative;z-index:1}
.hero.open .hero-ext{display:block}
.hero-ext-l{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;opacity:.8;margin-bottom:4px}
.hero-ext-v{font-size:13px;line-height:1.5}

/* PROGRESS / METRIC BARS */
.mbar{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.mbar:last-child{margin-bottom:0}
.mbar-h{display:flex;justify-content:space-between;font-size:12px}
.mbar-h-l{color:var(--tx2);font-weight:500}
.mbar-h-v{font-family:'IBM Plex Mono',monospace;font-weight:600}
.mbar-tk{height:7px;background:var(--bg);border-radius:4px;overflow:hidden;position:relative}
.mbar-fl{height:100%;border-radius:4px;transition:width .3s}
.mbar-bm{position:absolute;top:-2px;bottom:-2px;width:1px;background:var(--tx3)}
.mbar-bm-l{position:absolute;font-size:9px;color:var(--tx3);font-family:'IBM Plex Mono',monospace}

/* FOLLOW-UP TRACKER */
.fu-row{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--bd);font-size:13px}
.fu-row:last-child{border-bottom:none}
.fu-p{font-weight:600;color:var(--tx)}
.fu-p-sub{font-size:11.5px;color:var(--tx3);font-weight:400;margin-top:1px}
.fu-due{font-size:11.5px;color:var(--tx2);white-space:nowrap}
.fu-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px;font-family:'IBM Plex Mono',monospace}
.fu-tag-od{background:#fee2e2;color:#991b1b}
.fu-tag-st{background:#fef3c7;color:#92400e}
.fu-tag-pn{background:#dbeafe;color:#1e40af}
.fu-act{font-size:11.5px;color:var(--ac);cursor:pointer;font-weight:500}
.fu-act:hover{text-decoration:underline}
.fu-empty{padding:24px;text-align:center;color:var(--tx3);font-size:13px}

/* ENTERPRISE FUNNEL */
.fn{display:flex;flex-direction:column;gap:14px;padding:8px 4px}
.fn-st{display:flex;flex-direction:column;gap:6px}
.fn-sh{display:flex;justify-content:space-between;align-items:baseline;font-size:12px}
.fn-sh-l{color:var(--tx2);font-weight:500}
.fn-sh-v{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px}
.fn-sh-pct{color:var(--tx3);font-size:11px;margin-left:6px}
.fn-bar{height:32px;border-radius:6px;display:flex;align-items:center;padding-left:12px;color:#fff;font-size:11.5px;font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px}
.fn-bar-1{background:linear-gradient(90deg,#7c3aed,#8b5cf6)}
.fn-bar-2{background:linear-gradient(90deg,#0d9488,#14b8a6)}
.fn-bar-3{background:linear-gradient(90deg,#059669,#10b981)}
.fn-conv{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);padding-top:8px;border-top:1px solid var(--bd)}

/* LEADERBOARD */
.lb{width:100%;border-collapse:collapse;font-size:13px}
.lb th{text-align:left;padding:10px 12px;font-size:10.5px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bd);background:var(--bg)}
.lb th:first-child,.lb td:first-child{padding-left:18px}
.lb th:last-child,.lb td:last-child{padding-right:18px}
.lb td{padding:11px 12px;border-bottom:1px solid var(--bd);vertical-align:middle}
.lb tr{cursor:pointer}
.lb tr:hover td{background:var(--bg)}
.lb tr:last-child td{border-bottom:none}
.lb-rk{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--tx3);font-size:12px;width:30px}
.lb-nm{font-weight:600}
.lb-nm-sub{font-size:11px;color:var(--tx3);font-weight:400}
.lb-num{font-family:'IBM Plex Mono',monospace;font-weight:500}
.lb-pct{display:flex;align-items:center;gap:8px}
.lb-pct-bar{width:50px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.lb-pct-fl{height:100%;border-radius:3px}
.lb-mt{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500}
.lb-fl-tag{display:inline-block;background:#fee2e2;color:#991b1b;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px}
.lb-fl-tag.ok{background:var(--bg);color:var(--tx3)}

/* CALL LOG */
.filter-bar{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding:12px 16px;background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--shd);flex-wrap:wrap}
.filter-bar select{font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--bd);border-radius:7px;background:var(--bg);color:var(--tx);cursor:pointer}
.filter-bar .hint{font-size:11.5px;color:var(--tx3);margin-left:auto}
.filter-bar .count{font-size:12px;color:var(--tx2);font-family:'IBM Plex Mono',monospace}

.call{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--shd)}
.call-flag{border-color:#fca5a5;background:linear-gradient(to right,#fef2f2 0%,var(--cd) 6%)}
.call-admin{border-style:dashed;opacity:.78}
.call-ma{border-color:#dc2626;border-width:1.5px;background:linear-gradient(to right,#fee2e2 0%,var(--cd) 8%)}
.call-hd{padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;flex-wrap:wrap}
.call-hd:hover{background:var(--bg)}
.call-p{font-weight:600;font-size:13.5px}
.call-p-sub{font-size:11.5px;color:var(--tx3);font-weight:400;margin-top:1px}
.dir-badge{display:inline-block;font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace}
.dir-in{background:#d1fae5;color:#065f46}
.dir-out{background:#dbeafe;color:#1e40af}
.dir-admin{background:var(--bg);color:var(--tx2);border:1px dashed var(--bd2)}
.dir-transfer{background:#ede9fe;color:#5b21b6}
.dir-hot{background:#fef3c7;color:#92400e}
.dir-follow{background:#cffafe;color:#155e75}
.fl-tag{font-size:10px;font-weight:600;color:#991b1b;background:#fee2e2;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px;font-family:'IBM Plex Mono',monospace}
.cf-tag{font-size:10px;font-weight:600;color:#92400e;background:#fef3c7;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px;font-family:'IBM Plex Mono',monospace}

/* Negative Reviews tab */
.dot-new{display:none;width:9px;height:9px;border-radius:50%;background:var(--rd);margin-left:6px;vertical-align:middle;box-shadow:0 0 0 0 rgba(220,38,38,.45)}
.dot-new.show{display:inline-block;animation:dotPulse 2s infinite}
@keyframes dotPulse{0%{box-shadow:0 0 0 0 rgba(220,38,38,.45)}70%{box-shadow:0 0 0 6px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}
.rv-hd{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.rv-hd-t{font-size:18px;font-weight:600;color:var(--tx)}
.rv-hd-st{font-size:12.5px;color:var(--tx2)}
.rv-stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.rv-stat{padding:10px 14px;background:var(--cd);border:1px solid var(--bd);border-radius:8px;font-size:12px;color:var(--tx2);font-weight:500}
.rv-stat strong{font-family:'IBM Plex Mono',monospace;color:var(--tx);font-weight:700;margin-right:4px}
.rv-stat.rv-stat-new strong{color:var(--rd)}
.rv-card{background:var(--cd);border:1px solid var(--bd);border-radius:9px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.rv-card:hover{border-color:var(--bd2)}
.rv-card.rv-new{border-left:3px solid var(--rd)}
.rv-card.rv-cb{border-left:3px solid var(--am)}
.rv-card.rv-new.rv-cb{border-left:3px solid var(--rd);box-shadow:inset 3px 0 0 var(--am)}
.rv-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:8px;flex-wrap:wrap}
.rv-nm{font-size:14.5px;font-weight:600;color:var(--tx);flex:1;min-width:160px}
.rv-dt{font-size:11.5px;color:var(--tx3);font-family:'IBM Plex Mono',monospace}
.rv-cat{display:flex;gap:5px;flex-wrap:wrap;margin:6px 0 10px}
.rv-cat-p{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px;font-family:'IBM Plex Mono',monospace}
.rv-cat-comm{background:#dbeafe;color:#1e40af}
.rv-cat-prof{background:#fee2e2;color:#991b1b}
.rv-cat-time{background:#fef3c7;color:#92400e}
.rv-cat-other{background:#f3f4f6;color:#4b5563}
.rv-cb-tag{font-size:10px;font-weight:700;color:#fff;background:var(--am);padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px;font-family:'IBM Plex Mono',monospace}
.rv-new-tag{font-size:10px;font-weight:700;color:#fff;background:var(--rd);padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px;font-family:'IBM Plex Mono',monospace}
.rv-tx{font-size:13px;color:var(--tx);line-height:1.55;white-space:pre-line}
.rv-card:not(.open) .rv-tx{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.rv-contact{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--bd);font-size:12.5px;color:var(--tx2)}
.rv-card.open .rv-contact{display:block}
.rv-contact-row{display:flex;gap:10px;margin-bottom:5px}
.rv-contact-l{font-weight:600;color:var(--tx3);min-width:60px;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.rv-contact-v{font-family:'IBM Plex Mono',monospace;color:var(--tx)}
.rv-contact-v.masked{color:var(--tx3);font-style:italic}
.rv-show-btn{font-size:11px;color:var(--ac);cursor:pointer;font-weight:500;margin-left:8px}
.rv-show-btn:hover{text-decoration:underline}
.rv-empty{text-align:center;padding:60px 20px;color:var(--tx3);font-size:13px;background:var(--cd);border:1px solid var(--bd);border-radius:9px}
.ma-tag{font-size:10px;font-weight:700;color:#fff;background:#dc2626;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px;font-family:'IBM Plex Mono',monospace;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.ngr-tag{font-size:9.5px;font-weight:600;color:var(--tx3);background:var(--bg);padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace;border:1px solid var(--bd2)}
.dots{display:flex;gap:4px;margin-left:auto}
.dot{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:9px;font-weight:700;color:#fff}
.dot-ok{background:var(--gn)}
.dot-no{background:var(--rd);opacity:.55}
.dot-en{background:var(--pu)}
.dot-en-no{background:var(--bg);color:var(--tx3);border:1px solid var(--bd2);opacity:.7}
.call-dur{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--tx3);min-width:42px;text-align:right}

.call-bd{display:none;padding:0 16px 16px 16px;border-top:1px solid var(--bd);background:linear-gradient(to bottom,var(--bg),transparent 30%)}

.call-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding-top:14px}
.cb{padding:12px 14px;background:var(--cd);border:1px solid var(--bd);border-radius:8px;border-left-width:3px}
.cb-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.cb-tx{font-size:12.5px;line-height:1.55;color:var(--tx2)}
.cb-st{border-left-color:var(--gn)}.cb-st .cb-l{color:var(--gn)}
.cb-fl{border-left-color:var(--rd)}.cb-fl .cb-l{color:var(--rd)}
.cb-co{border-left-color:var(--am)}.cb-co .cb-l{color:var(--am)}
.cb-en{border-left-color:var(--pu)}.cb-en .cb-l{color:var(--pu)}
.cb-na{border-left-color:var(--ac)}.cb-na .cb-l{color:var(--ac)}
.cb-ma{border-left-color:var(--rd);background:#fef2f2}.cb-ma .cb-l{color:#991b1b}.cb-ma .cb-tx{color:#7f1d1d}
.cb-rec{margin-top:14px;padding:13px 16px;background:linear-gradient(135deg,#dbeafe,#eff6ff);border:1px solid #bfdbfe;border-radius:8px;border-left:3px solid var(--ac)}
.cb-rec-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ac);margin-bottom:5px}
.cb-rec-tx{font-size:13px;line-height:1.5;color:#1e3a8a}
.call-act{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.act-btn{font-size:11.5px;padding:7px 13px;background:var(--cd);border:1px solid var(--bd);border-radius:7px;cursor:pointer;color:var(--tx2);font-family:inherit;font-weight:500}
.act-btn:hover{background:var(--bg);color:var(--tx);border-color:var(--bd2)}

/* Rep card send button */
.rep-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px}
.rep-btn{padding:7px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--cd);color:var(--tx);font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.2px;transition:all .15s}
.rep-btn:hover:not(:disabled){background:var(--ac);color:#fff;border-color:var(--ac)}
.rep-btn:disabled{opacity:.6;cursor:not-allowed}

/* REP CARDS */
.rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.rep-cd{cursor:pointer;transition:transform .15s,box-shadow .15s}
.rep-cd:hover{transform:translateY(-1px);box-shadow:var(--shd2)}
.rep-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}

/* TRAINING TAB */

<script>
// ════════════════════════════════════════════════════════════════════
// DATA · V3 schema. Sample data illustrates structure; real data flows
// from Call_Scores Google Sheet via nightly n8n workflow.
// ════════════════════════════════════════════════════════════════════
let D = {
  // Empty initial state. Populated by A3 fetch (CONFIG.dataUrl) or
  // by a hydrated localStorage cache. The "no data" banner shows
  // until real data flows. All keys present so renderers don't break.
  meta: { last_updated: null, sample: false, period_days: 30 },
  alerts: [],
  team: { total_calls:0, score_90_plus_count:0, red_flag_count:0, avg_score:0, active_reps:0 },
  daily: [],
  reps: [],
  metrics: { next_step:0, objection:0, decision_maker:0, budget_value:0, enterprise:0 },
  calls: [],
  followups: [],
  enterprise_funnel: { signals_identified:0, explored:0, converted:0 },
  obj_lib: { pricing:[], timing:[], authority:[], competition:[], other:[] },
  obj_trend: [],
  dm_lib: [],
  ent_lib: [],
  negative_reviews: []
};

// ════════════════════════════════════════════════════════════════════
// STATE + HELPERS
// ════════════════════════════════════════════════════════════════════
const STATE = { range:"all", rep:"" };
const CL = { gn:"#059669", rd:"#dc2626", am:"#d97706", pu:"#7c3aed", ac:"#2563eb", ac2:"#3b82f6", tl:"#0d9488", cy:"#0891b2", tx3:"#94a3b8" };
const B = { home:false, calls:false, reps:false, train:false, reviews:false };

const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const pc = v => v == null ? "var(--tx3)" : v >= 90 ? "var(--gn)" : v >= 70 ? "var(--am)" : "var(--rd)";
const mc = (v,b) => v >= b ? "var(--gn)" : v >= b*.7 ? "var(--am)" : "var(--rd)";
const fmtPct = v => v == null ? "n/a" : v + "%";
// Per contract Section 6: aggregates use one decimal when fractional, no decimal when whole
const fmtAvg = v => {
  if (v == null || isNaN(v)) return "n/a";
  return Number.isInteger(v) ? v + "%" : v.toFixed(1) + "%";
};

// V3 call_classification → display badge
const CLS_MAP = {
  inbound_sales:    { label:"INBOUND",    cls:"dir-in" },
  outbound_sales:   { label:"OUTBOUND",   cls:"dir-out" },
  admin_logistics:  { label:"ADMIN",      cls:"dir-admin" },
  transfer:         { label:"TRANSFER",   cls:"dir-transfer" },
  follow_up:        { label:"FOLLOW-UP",  cls:"dir-follow" },
  unknown:          { label:"UNKNOWN",    cls:"dir-admin" }
};
const dirBadge = c => {
  const m = CLS_MAP[c] || CLS_MAP.unknown;
  return `<span class="dir-badge ${m.cls}">${m.label}</span>`;
};

// Filter calls by current date range
function filterByRange(calls) {
  if (STATE.range === "all") return calls;
  const days = STATE.range === "today" ? 1 : STATE.range === "week" ? 7 : 30;
  const cutoff = new Date(D.meta.last_updated);
  cutoff.setDate(cutoff.getDate() - days);
  return calls.filter(c => new Date(c.call_datetime) >= cutoff);
}

function aggCalls(calls) {
  const graded = calls.filter(c => c.graded && c.score_percentage != null);
  const t = calls.length;
  const p90 = graded.filter(c => c.score_percentage >= 90).length;
  const rf = calls.filter(c => c.red_flag_count > 0).length;
  const avg = graded.length ? graded.reduce((s,c) => s+c.score_percentage, 0) / graded.length : 0;
  const reps = new Set(calls.map(c => c.rep_name));
  return { t, p90, rf, avg, active: reps.size, graded: graded.length };
}

function repAgg(repName, calls) {
  const own = calls.filter(c => c.rep_name === repName);
  const graded = own.filter(c => c.graded && c.score_percentage != null);
  const avg = graded.length ? graded.reduce((s,c) => s+c.score_percentage, 0) / graded.length : 0;
  const p90 = graded.filter(c => c.score_percentage >= 90).length;
  const rf = own.filter(c => c.red_flag_count > 0).length;
  const hits = { next_step:0, objection:0, decision_maker:0, budget_value:0, enterprise:0 };
  graded.forEach(c => {
    if (c.next_step_set) hits.next_step++;
    if (c.objection_surfaced) hits.objection++;
    if (c.decision_maker_identified) hits.decision_maker++;
    if (c.budget_value_communicated) hits.budget_value++;
    if (c.enterprise_probed) hits.enterprise++;
  });
  return { total: own.length, graded: graded.length, p90, rf, avg, metric_hits: hits };
}

// ════════════════════════════════════════════════════════════════════
// DATA SOURCE CONFIG
// ────────────────────────────────────────────────────────────────────
// Set CONFIG.dataUrl to your n8n webhook (or other JSON endpoint) once
// the data feed workflow is built. Until then, the dashboard runs on
// the embedded sample data above.
//
// Endpoint must return JSON matching the canonical V3 schema. Per
// AUTOMATION_2_BUILD_CONTRACT V1.1 Section 22, call rows use:
//   call_id, rep_name, prospect_name, contact_name,
//   call_type_inferred (HOT|WARM|COLD|SERVICE|RESIDENTIAL|NOT_SALES),
//   call_classification (inbound_sales|outbound_sales|admin_logistics|transfer|follow_up),
//   industry_inferred, meeting_duration_minutes, call_date, call_datetime,
//   score_percentage (60-100 or null when graded:false), graded,
//   red_flag_count, coaching_flag_count, red_flags, manager_alert_reason,
//   next_step_set, objection_surfaced, decision_maker_identified,
//   budget_value_communicated, enterprise_probed,
//   strengths, coaching, recommendation, decision_path_next_action,
//   enterprise_notes, industry_compliance_met, is_short_call, deal_priority
//
// Top-level shape: { meta, alerts, team, daily, reps, metrics, calls,
//   followups, enterprise_funnel, obj_lib, obj_trend, dm_lib, ent_lib,
//   negative_reviews }
//
// Sheets read by A3:
//   Master sheet (1BxE4s0YlXxQt7c_XGmjHRkgu1hAFWO9CB96mLi4EM_4):
//     Call_Scores, Dead_Calls, Service_Log
//   Reviews sheet (1YF1c5KYSHi6NxhtS5yV5zDK9hlQkUeHIt45gYRhTbBk):
//     Form_Responses (returns negative_reviews top-level key)
//
// negative_reviews row shape:
//   { review_id, timestamp, name, categories[], narrative,
//     wants_callback, email, phone }
//
// CORS note: if hosting the HTML and the endpoint on different origins,
// the n8n webhook response must include Access-Control-Allow-Origin.
// ════════════════════════════════════════════════════════════════════
const CONFIG = {
  dataUrl: "https://stsrecycling.app.n8n.cloud/webhook/dashboard-data",
  triggerUrl: null,         // e.g. "https://stsrecycling.app.n8n.cloud/webhook/daily-report-now"
  defaultIntervalMin: 0     // 0 = off
};
let refreshTimer = null;

// ════════════════════════════════════════════════════════════════════
// CACHE LAYER
// ────────────────────────────────────────────────────────────────────
// Persist the latest A3 response in localStorage so the dashboard
// renders instantly on next page load and stays useful when A3 is
// briefly unreachable. Always fetch fresh in background. Cache is
// per-browser, per-device.
//
// Bump CACHE_VERSION whenever the canonical V3 payload shape changes
// in a way that would break older cached payloads. Mismatched-version
// caches are silently discarded on read.
// ════════════════════════════════════════════════════════════════════
const CACHE_VERSION = 1;
const CACHE_KEY = 'sts_dashboard_cache_v' + CACHE_VERSION;

function readCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (parsed.version !== CACHE_VERSION) return null;
    if (!parsed.payload || !parsed.payload.meta) return null;
    return parsed; // { version, written_at, payload }
  } catch (e) {
    return null;
  }
}

function writeCache(payload) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      version: CACHE_VERSION,
      written_at: new Date().toISOString(),
      payload
    }));
  } catch (e) {
    console.warn('Cache write failed:', e);
  }
}

async function loadData(manual = false) {
  if (!CONFIG.dataUrl) {
    setStatus("sample", "Sample");
    if (manual) {
      // Briefly indicate the click was received even though no fetch happened
      const btn = document.getElementById("rfshBtn");
      btn.classList.add("spin");
      setTimeout(() => btn.classList.remove("spin"), 600);
      console.warn("loadData: CONFIG.dataUrl not set. Edit the file or wire an n8n webhook URL.");
    }
    return;
  }
  setStatus("loading", "Refreshing");
  document.getElementById("rfshBtn").classList.add("spin");
  try {
    const r = await fetch(CONFIG.dataUrl, { cache: "no-store" });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const fresh = await r.json();
    if (!fresh || !fresh.meta) throw new Error("Response missing meta block");
    D = fresh;
    writeCache(D);
    document.getElementById("rfshStatus").title = "Last updated " + fmtTs(D.meta.last_updated);
    renderAlerts();
    rebuildAll();
    setStatus("ok", "Live, just now");
    updateNoDataBanner();
  } catch (e) {
    // Fetch failed. If we have a cached payload, keep showing it and
    // mark the status pill so the user knows data is stale.
    const cached = readCache();
    if (cached) {
      setStatus("cached", "Cached");
      document.getElementById("rfshStatus").title = "Fetch failed, showing cached data from " + fmtTs(cached.written_at);
    } else {
      setStatus("err", "Refresh failed");
    }
    updateNoDataBanner();
    console.error("loadData error:", e);
  } finally {
    document.getElementById("rfshBtn").classList.remove("spin");
  }
}

function setStatus(state, text) {
  const el = document.getElementById("rfshStatus");
  el.className = "rfsh-st rfsh-" + state;
  el.textContent = text;
}

function updateNoDataBanner() {
  const banner = document.getElementById("nodataBanner");
  const title = document.getElementById("nodataTitle");
  const msg = document.getElementById("nodataMsg");
  const hasLiveData = D && D.meta && D.meta.last_updated;
  const hasCache = readCache() != null;

  if (!CONFIG.dataUrl) {
    title.textContent = "Dashboard not connected";
    msg.innerHTML = 'No data feed URL configured. Set <span class="mono">CONFIG.dataUrl</span> in the file or wait for the feed to be wired.';
    banner.classList.remove("hide");
    return;
  }
  if (!hasLiveData && !hasCache) {
    title.textContent = "Cannot reach the data feed";
    msg.textContent = "No data has been received yet. Check that the n8n workflow is active and the URL is correct, then try again.";
    banner.classList.remove("hide");
    return;
  }
  banner.classList.add("hide");
}

function setRefreshInterval(min) {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  if (min > 0 && CONFIG.dataUrl) {
    refreshTimer = setInterval(() => loadData(false), min * 60 * 1000);
  }
}

// ════════════════════════════════════════════════════════════════════
// MANUAL REPORT TRIGGER
// ────────────────────────────────────────────────────────────────────
// POSTs to CONFIG.triggerUrl with a mode payload. The n8n workflow
// reads `mode` and routes:
//   { mode:"manager" }                   → run + email Sam only
//   { mode:"rep", rep_name:"Lee Garner" } → run + email that rep only
// rep_email is intentionally not sent. n8n looks up canonical emails
// from the directory or Call_Scores to avoid trusting client payloads.
// ════════════════════════════════════════════════════════════════════
async function sendReport(mode, payload = {}, btn = null) {
  if (!CONFIG.triggerUrl) {
    alert("Manual trigger not configured.\n\nSet CONFIG.triggerUrl in the file to your n8n webhook URL (e.g. https://stsrecycling.app.n8n.cloud/webhook/daily-report-now).");
    return false;
  }
  const label = mode === "manager" ? "manager report to Sam" : `coaching report to ${payload.rep_name}`;
  if (!confirm(`Send the ${label} now?\n\nThis triggers the daily report workflow immediately instead of waiting for the 5:30pm scheduled run.`)) return false;

  const origText = btn ? btn.textContent : null;
  if (btn) { btn.disabled = true; btn.textContent = "Sending…"; }

  try {
    const r = await fetch(CONFIG.triggerUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mode, ...payload, triggered_by: "dashboard", triggered_at: new Date().toISOString() })
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    if (btn) { btn.textContent = "✓ Sent"; setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 2500); }
    else { alert(`Sent. The ${label} should arrive within a couple of minutes.`); }
    return true;
  } catch (e) {
    if (btn) { btn.textContent = "✗ Failed"; setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 3000); }
    alert(`Send failed: ${e.message}\n\nCheck the n8n workflow status and CORS headers on the webhook.`);
    console.error("sendReport error:", e);
    return false;
  }
}

function sendRepReport(repName, btn) {
  return sendReport("rep", { rep_name: repName }, btn);
}

// TAB SWITCHING
// ════════════════════════════════════════════════════════════════════
function st(id, btn) {
  document.querySelectorAll("nav.tabs button").forEach(b => b.classList.remove("on"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("on"));
  btn.classList.add("on");
  document.getElementById(id).classList.add("on");
  if (!B[id]) {
    if (id === "home") buildHome();
    if (id === "calls") buildCalls();
    if (id === "reps") buildReps();
    if (id === "train") buildTrain();
    if (id === "reviews") buildReviews();
    B[id] = true;
  }
  if (id === "reviews") markReviewsViewed();
}

function rebuildAll() {
  Object.keys(B).forEach(k => B[k] = false);
  // Rebuild whatever tab is currently visible so refreshes show immediately
  const active = document.querySelector(".tab.on");
  const id = active ? active.id : "home";
  if (id === "home") buildHome();
  else if (id === "calls") buildCalls();
  else if (id === "reps") buildReps();
  else if (id === "train") buildTrain();
  else if (id === "reviews") buildReviews();
  B[id] = true;
  updateReviewsBadge();
}

function metricBar(label, v, bm) {
  const w = Math.min(v, 100);
  const bmPos = Math.min(bm, 100);
  return `<div class="mbar">
    <div class="mbar-h"><span class="mbar-h-l">${label}</span><span class="mbar-h-v" style="color:${mc(v,bm)}">${v}%</span></div>

function funnelStage(n, label, val, max) {
  const pct = Math.round(val / max * 100);

    <div class="fn-sh"><span class="fn-sh-l">${label}</span><span class="fn-sh-v">${val}<span class="fn-sh-pct">${pct}%</span></span></div>

}

// CHARTS
// ════════════════════════════════════════════════════════════════════
function chartTheme() {
  const dark = document.documentElement.getAttribute("data-t") === "dark";
  return {
    grid: dark ? "rgba(148,163,184,.12)" : "rgba(148,163,184,.12)",
    text: dark ? "#cbd5e1" : "#475569",
    bg: dark ? "#1e293b" : "#fff",
    bd: dark ? "#334155" : "#e2e8f0"
  };
}

function drawTrend(calls) {
  const th = chartTheme();
  // Group by date
  const byDate = {};
  calls.filter(c => c.graded && c.score_percentage != null).forEach(c => {
    if (!byDate[c.call_date]) byDate[c.call_date] = [];
    byDate[c.call_date].push(c.score_percentage);
  });
  const dates = Object.keys(byDate).sort();
  const avgs = dates.map(d => Math.round(byDate[d].reduce((a,b) => a+b, 0) / byDate[d].length));

  // Fall back to D.daily if filtered set has too few points
  const useDaily = dates.length < 4;
  const labels = useDaily ? D.daily.map(d => d.date) : dates;
  const values = useDaily ? D.daily.map(d => d.avg_score) : avgs;

  new Chart(document.getElementById("chTrend"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Avg %",
        data: values,
        borderColor: CL.ac,
        backgroundColor: ctx => {
          const c = ctx.chart.ctx.createLinearGradient(0,0,0,200);
          c.addColorStop(0, "rgba(37,99,235,.18)");
          c.addColorStop(1, "rgba(37,99,235,0)");
          return c;
        },
        fill: true,
        tension: .3,
        pointRadius: 3,
        pointBackgroundColor: CL.ac,
        borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: tooltipOpts() },
      scales: {
        y: { beginAtZero: false, min: 55, max: 100, grid: { color: th.grid }, ticks: { color: th.text, font: { family: "Outfit", size: 11 }, callback: v => v + "%" } },
        x: { grid: { display: false }, ticks: { color: th.text, font: { family: "Outfit", size: 11 } } }
      }
    }
  });
}

function drawDist(graded) {
  const th = chartTheme();
  const buckets = [
    { l: "<70%", min: 0, max: 70, c: CL.rd },
    { l: "70-79%", min: 70, max: 80, c: CL.am },
    { l: "80-89%", min: 80, max: 90, c: CL.ac2 },
    { l: "90%+", min: 90, max: 101, c: CL.gn }
  ];
  const counts = buckets.map(b => graded.filter(c => c.score_percentage != null && c.score_percentage >= b.min && c.score_percentage < b.max).length);
  new Chart(document.getElementById("chDist"), {
    type: "bar",
    data: { labels: buckets.map(b => b.l), datasets: [{ data: counts, backgroundColor: buckets.map(b => b.c), borderRadius: 6, borderSkipped: false }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: tooltipOpts() },
      scales: { y: { beginAtZero: true, grid: { color: th.grid }, ticks: { color: th.text, font: { family: "Outfit", size: 11 } } }, x: { grid: { display: false }, ticks: { color: th.text, font: { family: "Outfit", size: 11, weight: 600 } } } }
    }
  });
}

function drawTypes(calls) {
  const th = chartTheme();
  const types = {};
  calls.forEach(c => { const k = c.call_type_inferred || "UNKNOWN"; types[k] = (types[k] || 0) + 1; });
  const labels = Object.keys(types);
  const data = Object.values(types);
  const palette = [CL.am, CL.ac2, CL.gn, CL.pu, CL.cy, CL.tx3, CL.tl];
  new Chart(document.getElementById("chTypes"), {
    type: "doughnut",
    data: { labels, datasets: [{ data, backgroundColor: palette.slice(0, labels.length), borderWidth: 2, borderColor: th.bg }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: "62%",
      plugins: { legend: { position: "right", labels: { color: th.text, font: { family: "Outfit", size: 11 }, padding: 10, boxWidth: 10 } }, tooltip: tooltipOpts() }
    }
  });
}

function tooltipOpts() {
  return { backgroundColor: "rgba(255,255,255,.98)", titleColor: "#0f172a", bodyColor: "#475569", borderColor: "#e2e8f0", borderWidth: 1, padding: 10, cornerRadius: 8, titleFont: { family: "Outfit", size: 12, weight: 600 }, bodyFont: { family: "Outfit", size: 12 } };

function buildCalls() {
  const root = document.getElementById("calls");
  const allReps = [...new Set(D.calls.map(c => c.rep_name))].sort();
  root.innerHTML = `
    <div class="filter-bar">

      <select id="repFilter">
        <option value="">All reps (${D.calls.length})</option>
        ${allReps.map(r => `<option value="${esc(r)}" ${STATE.rep===r?"selected":""}>${esc(r)}</option>`).join("")}
      </select>
      <span class="hint">Click any call to expand full coaching</span>
      <span class="count" id="callCount">…</span>
    </div>
    <div id="callList"></div>
  `;
  document.getElementById("repFilter").addEventListener("change", e => {
    STATE.rep = e.target.value;
    renderCallList();
  });
  renderCallList();
}

function renderCallList() {
  let calls = filterByRange(D.calls);
  if (STATE.rep) calls = calls.filter(c => c.rep_name === STATE.rep);

  // Sort: red flags first, then manager alerts, then by datetime desc
  calls = [...calls].sort((a,b) => {
    if (a.red_flag_count !== b.red_flag_count) return b.red_flag_count - a.red_flag_count;
    const aMa = a.manager_alert_reason ? 1 : 0;
    const bMa = b.manager_alert_reason ? 1 : 0;
    if (aMa !== bMa) return bMa - aMa;
    return new Date(b.call_datetime) - new Date(a.call_datetime);
  });

  document.getElementById("callCount").textContent = calls.length + " calls";
  document.getElementById("callsBadge").textContent = calls.length;
  document.getElementById("callList").innerHTML = calls.length === 0
    ? `<div class="cd" style="text-align:center;color:var(--tx3);padding:40px">No calls match the current filter.</div>`
    : calls.map(callCard).join("");
}

function callCard(c) {
  const cls = ["call"];
  if (c.red_flag_count > 0) cls.push("call-flag");
  if (c.manager_alert_reason) cls.push("call-ma");
  if (!c.graded && (c.call_classification === "admin_logistics" || c.call_classification === "transfer")) cls.push("call-admin");

  const dots = [
    metricDot("NS", c.next_step_set),
    metricDot("DM", c.decision_maker_identified),
    metricDot("BU", c.budget_value_communicated),
    metricDot("OB", c.objection_surfaced),
    `<div class="dot ${c.enterprise_probed?'dot-en':'dot-en-no'}" title="Enterprise">EN</div>`
  ].join("");

  const ngrTag = !c.graded ? `<span class="ngr-tag">Not Scored</span>` : "";
  const rfTag = c.red_flag_count > 0 ? `<span class="fl-tag">🚩 ${c.red_flag_count} red</span>` : "";
  const cfTag = c.coaching_flag_count > 0 ? `<span class="cf-tag">⚑ ${c.coaching_flag_count} coach</span>` : "";
  const maTag = c.manager_alert_reason ? `<span class="ma-tag">⚠ Manager Alert</span>` : "";
  const pctDisp = c.graded && c.score_percentage != null ? c.score_percentage + "%" : "n/g";

  return `<div class="${cls.join(" ")}">
    <div class="call-hd" onclick="document.getElementById('cb-${c.call_id}').classList.toggle('open')">
      <div>
        <div class="call-p">${esc(c.prospect_name)}</div>
        <div class="call-p-sub">${esc(c.rep_name)} → ${esc(c.contact_name)} · ${esc(c.industry_inferred)} · ${esc(c.call_type_inferred)}</div>
      </div>
      ${dirBadge(c.call_classification)}
      ${rfTag}
      ${cfTag}
      ${maTag}
      ${ngrTag}
      <div class="dots">${dots}</div>
      <span class="call-dur mono">${c.meeting_duration_minutes}m</span>
      <span class="call-pct" style="color:${pc(c.score_percentage)}">${pctDisp}</span>
    </div>
    <div class="call-bd" id="cb-${c.call_id}">
      ${c.manager_alert_reason?`<div class="cb cb-ma" style="margin-top:14px"><div class="cb-l">⚠ Manager Alert (Sam-only)</div><div class="cb-tx">${esc(c.manager_alert_reason)}</div></div>`:""}
      <div class="call-grid">
        <div>
          ${c.strengths?`<div class="cb cb-st"><div class="cb-l">Strengths</div><div class="cb-tx">${esc(c.strengths)}</div></div>`:""}
          ${c.red_flags?`<div class="cb cb-fl" style="margin-top:10px"><div class="cb-l">Red Flag</div><div class="cb-tx">${esc(c.red_flags)}</div></div>`:""}
          ${c.coaching?`<div class="cb cb-co" style="margin-top:10px"><div class="cb-l">Coaching</div><div class="cb-tx">${esc(c.coaching)}</div></div>`:""}
        </div>
        <div>
          ${c.decision_path_next_action?`<div class="cb cb-na"><div class="cb-l">Next Action</div><div class="cb-tx">${esc(c.decision_path_next_action)}</div></div>`:""}
          ${c.enterprise_notes?`<div class="cb cb-en" style="margin-top:10px"><div class="cb-l">Enterprise Signal</div><div class="cb-tx">${esc(c.enterprise_notes)}</div></div>`:""}
        </div>
      </div>
      ${c.recommendation?`<div class="cb-rec"><div class="cb-rec-l">Recommendation</div><div class="cb-rec-tx">${esc(c.recommendation)}</div></div>`:""}
      <div class="call-act">
        <button class="act-btn" onclick="event.stopPropagation();alert('View transcript ${c.call_id} (wire to Krisp URL)')">📄 View Transcript</button>
        <button class="act-btn" onclick="event.stopPropagation();alert('Schedule follow-up ${c.call_id} (wire to Calendar)')">📅 Schedule Follow-up</button>
        <button class="act-btn" onclick="event.stopPropagation();alert('Open ${c.call_id} in CRM (wire to SugarCRM)')">🔗 Open in CRM</button>
      </div>
    </div>
  </div>`;
}

function metricDot(label, ok) {
  return `<div class="dot ${ok?'dot-ok':'dot-no'}" title="${label}">${ok?'✓':'×'}</div>`;
}

// REPS TAB
// ════════════════════════════════════════════════════════════════════
function buildReps() {
  const calls = filterByRange(D.calls);
  const repList = D.reps.map(r => {
    const a = repAgg(r.name, calls);
    return { ...r, ...a };
  }).filter(r => r.total > 0).sort((a,b) => b.avg - a.avg);

  document.getElementById("reps").innerHTML = `<div class="rep-grid">${repList.map(repCard).join("")}</div>`;
}

function repCard(r) {
  const odBadge = r.overdue_followups > 0 ? `<span class="rep-od">${r.overdue_followups} OVERDUE</span>` : "";
  const hitPct = (n) => Math.round((r.metric_hits[n] / r.graded * 100) || 0);
  return `<div class="cd rep-cd" onclick="goToRep('${esc(r.name)}')">
    <div class="rep-hd">
      <div>
        <div class="rep-nm">${esc(r.name)}</div>
        <div class="rep-em">${esc(r.email)}</div>
        <div class="rep-cnt">${r.total} calls · ${r.graded} graded ${odBadge}</div>
      </div>
      <div style="text-align:right">
        <div class="rep-big" style="color:${pc(r.avg)}">${fmtAvg(r.avg).replace('%','<span style="font-size:18px">%</span>')}</div>
        <div style="font-size:10.5px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px">Avg score</div>
      </div>
    </div>
    <div class="rep-stats">
      <div class="rep-st"><div class="rep-st-v">${r.total}</div><div class="rep-st-l">Total</div></div>
      <div class="rep-st"><div class="rep-st-v" style="color:var(--gn)">${r.p90}</div><div class="rep-st-l">90%+</div></div>
      <div class="rep-st"><div class="rep-st-v" style="color:var(--am)">${r.graded - r.p90}</div><div class="rep-st-l">Below</div></div>
      <div class="rep-st"><div class="rep-st-v" style="color:var(--rd)">${r.rf}</div><div class="rep-st-l">Flags</div></div>
    </div>
    ${metricBar("Next Step", hitPct('next_step'), 70)}
    ${metricBar("Decision Maker", hitPct('decision_maker'), 40)}
    ${metricBar("Budget / Value", hitPct('budget_value'), 50)}
    ${metricBar("Objection", hitPct('objection'), 30)}
    <div class="rep-actions no-print">
      <button class="rep-btn" onclick="event.stopPropagation();sendRepReport('${esc(r.name)}',this)">📧 Send Report</button>
      <span class="rep-vl">View calls →</span>
    </div>
  </div>`;
}

// TRAINING TAB
// ════════════════════════════════════════════════════════════════════
function buildTrain() {
  const buckets = [
    { k:"authority", lbl:"Authority / Decision Maker", desc:"Calls where the decision maker wasn't identified or confirmed" },
    { k:"pricing", lbl:"Pricing / Budget", desc:"Cost concerns surfaced but not handled with value reframe" },
    { k:"timing", lbl:"Timing / Urgency", desc:"Stalls and 'next month' deflections without probing" },
    { k:"competition", lbl:"Competition / Shopping", desc:"Prospect comparing options without rep probing the alternatives" },
    { k:"other", lbl:"Other Misses", desc:"Compliance gaps, no progression, or scope-specific misses" }
  ];

  const objHtml = buckets.map(b => {
    const items = D.obj_lib[b.k] || [];
    return `<div class="bucket" id="bk-${b.k}">
      <div class="bucket-hd" onclick="document.getElementById('bk-${b.k}').classList.toggle('open')">
        <span class="bucket-arrow">▶</span>
        <span class="bucket-nm">${b.lbl}</span>
        <span class="bucket-cnt">${items.length}</span>
      </div>
      <div class="bucket-bd">
        <div style="font-size:11.5px;color:var(--tx3);padding:4px 0 6px">${b.desc}</div>
        ${items.map((it,i) => trainCard(it, `${b.k}-${i}`)).join("")}
      </div>
    </div>`;
  }).join("");

  document.getElementById("train").innerHTML = `
    <div class="cd" style="margin-bottom:14px">
      <div class="cd-h"><div class="cd-t">Objection Trend (4-week)</div><div class="cd-st">Misses by category, last 4 weeks</div></div>
      <div class="chart-wrap" style="height:200px"><canvas id="chObjTrend"></canvas></div>
    </div>

    <div class="cd" style="margin-bottom:14px">
      <div class="cd-h"><div class="cd-t">Objection Library</div><div class="cd-st">Real misses, categorized (click bucket to expand)</div></div>
      <div class="train-intro">Patterns Sam can drill on with reps. Each bucket shows recent calls where reps missed the moment, plus the recommended response.</div>
      ${objHtml}
    </div>

    <div class="cd" style="margin-bottom:14px">
      <div class="cd-h"><div class="cd-t">Decision Maker Identification</div><div class="cd-st">${D.dm_lib.length} examples</div></div>
      <div>${D.dm_lib.map((it,i) => trainCard(it, "dm-"+i)).join("")}</div>
    </div>

    <div class="cd" style="margin-bottom:14px">
      <div class="cd-h"><div class="cd-t">Enterprise Exploration</div><div class="cd-st">${D.ent_lib.length} examples</div></div>
      <div>${D.ent_lib.map((it,i) => trainCard(it, "en-"+i, true)).join("")}</div>
    </div>

    <div class="cd">
      <div class="cd-h"><div class="cd-t">Quick Reference</div><div class="cd-st">What earns each metric</div></div>
      <div class="cheat">
        ${cheatItem("Next Step", "+10%", "Did the rep set a specific, time-bound next action?", "I'll call you Tuesday at 2pm to confirm…")}
        ${cheatItem("Budget / Value", "+10%", "Was free pickup, COD, or value reframe communicated?", "We pay you for the equipment, not the other way around.")}
        ${cheatItem("Decision Maker", "+10%", "Did the rep confirm who approves the deal?", "Are you the one who signs off, or does someone else weigh in?")}
        ${cheatItem("Objection", "+5%", "Was at least one concern surfaced and addressed?", "Any concerns about the timing or scope?")}
        ${cheatItem("Enterprise", "+5% (always available)", "Did the rep probe parent org or multi-location?", "Does your company have other offices that handle this?")}
        ${cheatItem("Baseline", "60%", "Floor: nobody scores below 60%. Bonuses build to 100%.", "")}
      </div>
    </div>
  `;

  drawObjTrend();
  // Auto-open the first bucket so it's not a blank slab on tab open
  const firstKey = buckets[0].k;
  setTimeout(() => document.getElementById("bk-"+firstKey).classList.add("open"), 50);
}

function trainCard(it, id, isEnt) {
  const head = isEnt ? it.signal : it.narrative;
  return `<div class="tr-card" id="tc-${id}" onclick="document.getElementById('tc-${id}').classList.toggle('open')">
    <div class="tr-hd">
      <div style="flex:1">
        <div class="tr-pp">${esc(it.prospect_name)}</div>
        <div class="tr-pp-sub">${esc(it.rep_name)} · ${isEnt?"Enterprise signal":"Objection scenario"}</div>
      </div>
      <span class="tr-arrow">▶</span>
    </div>
    <div class="tr-bd">
      <div class="tr-miss">${esc(head)}</div>
      <div class="tr-rec"><div class="tr-rec-l">Recommendation</div><div class="tr-rec-tx">${esc(it.recommendation)}</div></div>
    </div>
  </div>`;
}

function cheatItem(label, bonus, desc, ex) {
  return `<div class="cheat-it">
    <h4>${label} <span class="cheat-bonus">${bonus}</span></h4>
    <p>${desc}</p>
    ${ex ? `<p class="cheat-ex">e.g., "${esc(ex)}"</p>` : ""}
  </div>`;
}

function drawObjTrend() {
  const th = chartTheme();
  const cats = [
    { k:"authority", l:"Authority", c:CL.rd },
    { k:"pricing", l:"Pricing", c:CL.am },
    { k:"timing", l:"Timing", c:CL.ac2 },
    { k:"competition", l:"Competition", c:CL.pu },
    { k:"other", l:"Other", c:CL.tx3 }
  ];
  new Chart(document.getElementById("chObjTrend"), {
    type: "line",
    data: {
      labels: D.obj_trend.map(w => w.week),
      datasets: cats.map(c => ({
        label: c.l,
        data: D.obj_trend.map(w => w[c.k]),
        borderColor: c.c, backgroundColor: c.c,
        tension: .3, pointRadius: 3, borderWidth: 2, fill: false
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: "bottom", labels: { color: th.text, font: { family: "Outfit", size: 11 }, padding: 12, boxWidth: 10, usePointStyle: true } },
        tooltip: tooltipOpts()
      },
      scales: {
        y: { beginAtZero: true, grid: { color: th.grid }, ticks: { color: th.text, font: { family: "Outfit", size: 11 } } },
        x: { grid: { display: false }, ticks: { color: th.text, font: { family: "Outfit", size: 11, weight: 600 } } }
      }
    }
  });
}

// ════════════════════════════════════════════════════════════════════
// NEGATIVE REVIEWS TAB
// ────────────────────────────────────────────────────────────────────
// Local notification state via localStorage. Tracks the latest review
// timestamp the user has seen. Anything newer triggers the red dot on
// the tab. Opening the tab clears the dot. State is per-browser, not
// synced across devices, which is fine for V1.
// ════════════════════════════════════════════════════════════════════
const REVIEWS_VIEWED_KEY = "sts_reviews_last_viewed";

function getReviewsLastViewed() {
  return localStorage.getItem(REVIEWS_VIEWED_KEY) || "1970-01-01T00:00:00";
}

function markReviewsViewed() {
  if (!D.negative_reviews || D.negative_reviews.length === 0) return;
  const latest = D.negative_reviews
    .map(r => r.timestamp)
    .sort()
    .reverse()[0];
  localStorage.setItem(REVIEWS_VIEWED_KEY, latest);
  updateReviewsBadge();
}

function updateReviewsBadge() {
  const reviews = D.negative_reviews || [];
  const lastViewed = getReviewsLastViewed();
  const newCount = reviews.filter(r => r.timestamp > lastViewed).length;
  const dot = document.getElementById("reviewsDot");
  const badge = document.getElementById("reviewsBadge");
  if (newCount > 0) {
    dot.classList.add("show");
    badge.textContent = newCount;
    badge.style.display = "inline-block";
  } else {
    dot.classList.remove("show");
    badge.style.display = "none";
  }
}

function buildReviews() {
  const reviews = (D.negative_reviews || []).slice().sort((a,b) =>
    new Date(b.timestamp) - new Date(a.timestamp)
  );
  const lastViewed = getReviewsLastViewed();
  const newCount = reviews.filter(r => r.timestamp > lastViewed).length;
  const cbCount = reviews.filter(r => r.wants_callback).length;

  // Category breakdown
  const catCounts = {};
  reviews.forEach(r => (r.categories || []).forEach(c => {
    catCounts[c] = (catCounts[c] || 0) + 1;
  }));
  const catEntries = Object.entries(catCounts).sort((a,b) => b[1] - a[1]);

  const root = document.getElementById("reviews");
  if (reviews.length === 0) {
    root.innerHTML = `
      <div class="rv-hd">
        <div class="rv-hd-t">Customer Complaints</div>
        <div class="rv-hd-st">No negative reviews on file</div>
      </div>
      <div class="rv-empty">When customers submit a negative review through the feedback form, it shows up here.</div>
    `;
    return;
  }

  root.innerHTML = `
    <div class="rv-hd">
      <div class="rv-hd-t">Customer Complaints</div>
      <div class="rv-hd-st">${reviews.length} on file · sorted newest first</div>
    </div>
    <div class="rv-stats">
      ${newCount > 0 ? `<div class="rv-stat rv-stat-new"><strong>${newCount}</strong> new since last visit</div>` : ""}
      <div class="rv-stat"><strong>${cbCount}</strong> requesting callback</div>
      ${catEntries.map(([c,n]) => `<div class="rv-stat"><strong>${n}</strong> ${esc(c)}</div>`).join("")}
    </div>
    <div id="rvList">
      ${reviews.map(r => reviewCard(r, lastViewed)).join("")}
    </div>
  `;
}

function reviewCard(r, lastViewed) {
  const isNew = r.timestamp > lastViewed;
  const cls = ["rv-card"];
  if (isNew) cls.push("rv-new");
  if (r.wants_callback) cls.push("rv-cb");

  const dt = new Date(r.timestamp);
  const dtStr = `${dt.getMonth()+1}/${dt.getDate()}/${dt.getFullYear()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;

  const catPills = (r.categories || []).map(c => {
    const lc = c.toLowerCase();
    let kind = "other";
    if (lc.includes("comm")) kind = "comm";
    else if (lc.includes("prof")) kind = "prof";
    else if (lc.includes("time") || lc.includes("schedul")) kind = "time";
    return `<span class="rv-cat-p rv-cat-${kind}">${esc(c)}</span>`;
  }).join("");

  const tags = [
    isNew ? `<span class="rv-new-tag">NEW</span>` : "",
    r.wants_callback ? `<span class="rv-cb-tag">⚠ Wants callback</span>` : ""
  ].filter(Boolean).join(" ");

  return `<div class="${cls.join(" ")}" onclick="this.classList.toggle('open')">
    <div class="rv-top">
      <div class="rv-nm">${esc(r.name || "Anonymous")}</div>
      ${tags}
      <div class="rv-dt">${dtStr}</div>
    </div>
    <div class="rv-cat">${catPills}</div>
    <div class="rv-tx">${esc(r.narrative || "(no narrative provided)")}</div>
    <div class="rv-contact">
      <div class="rv-contact-row">
        <span class="rv-contact-l">Email</span>
        ${contactField(r.email, 'email-' + r.review_id)}
      </div>
      <div class="rv-contact-row">
        <span class="rv-contact-l">Phone</span>
        ${contactField(r.phone, 'phone-' + r.review_id)}
      </div>
    </div>
  </div>`;
}

function contactField(val, id) {
  if (val == null || val === "") return `<span class="rv-contact-v masked">not provided</span>`;
  return `<span class="rv-contact-v masked" id="${id}" data-real="${esc(val)}">${maskContact(val)}</span><span class="rv-show-btn" onclick="event.stopPropagation();revealContact('${id}')">Show</span>`;
}

function maskContact(s) {
  if (!s) return "";
  if (s.includes("@")) {
    const [u, d] = s.split("@");
    return (u.length <= 2 ? u[0] : u.slice(0,2)) + "***@" + d;
  }
  // phone
  const digits = s.replace(/\D/g, "");
  if (digits.length >= 4) return "***-***-" + digits.slice(-4);
  return "***";
}

function revealContact(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = el.dataset.real;
  el.classList.remove("masked");
  // Remove the Show button next to it
  if (el.nextElementSibling && el.nextElementSibling.classList.contains("rv-show-btn")) {
    el.nextElementSibling.remove();
  }
}


// ════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════
function fmtTs(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, "0");
  return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// URL param: ?rep=Lee Garner pre-filters to that rep on load
function applyUrlParams() {
  const u = new URL(window.location.href);
  const rep = u.searchParams.get("rep");
  if (rep) {
    STATE.rep = rep;
  }
}

document.getElementById("rfshStatus").title = "Last updated " + fmtTs(D.meta.last_updated);

// Auto-refresh dropdown
const intervalSel = document.getElementById("rfshInterval");
intervalSel.value = String(CONFIG.defaultIntervalMin);
intervalSel.addEventListener("change", e => setRefreshInterval(parseInt(e.target.value, 10)));
setRefreshInterval(CONFIG.defaultIntervalMin);

applyUrlParams();

// Hydrate from localStorage cache if available, so the page renders
// instantly with last-known data while we fetch fresh in background.
const cachedSnapshot = CONFIG.dataUrl ? readCache() : null;
if (cachedSnapshot) {
  D = cachedSnapshot.payload;
}

renderAlerts();
buildHome();
B.home = true;
updateReviewsBadge();
updateNoDataBanner();

if (cachedSnapshot) {
  setStatus("loading", "Refreshing");
  document.getElementById("rfshStatus").title = "Showing cached data from " + fmtTs(cachedSnapshot.written_at) + ", fetching fresh";
}

// Initial data load attempt (no-op if CONFIG.dataUrl not set)
if (CONFIG.dataUrl) loadData(false);

// If a rep was passed via URL, jump to call log filtered to them
if (STATE.rep) {
  setTimeout(() => st("calls", document.querySelectorAll("nav.tabs button")[1]), 200);
}
</script>
